<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1·2호선 가동일보 통합 분석 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --primary: #004595; --primary-light: #eef4ff; --dark: #1e293b; --bg-light: #f1f5f9; --danger: #e11d48; --danger-light: #fff1f2; --warning: #f59e0b; --success: #10b981; --border: #e2e8f0; --na: #94a3b8; --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: var(--bg-light); color: var(--dark); overflow-y: scroll; line-height: 1.6; }
        .container { max-width: 1500px; margin: 0 auto; padding: 0 20px; }
        .app-header { background: white; border-bottom: 2px solid var(--primary); padding: 12px 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .header-inner { display: flex; justify-content: space-between; align-items: center; }
        .back-btn { background: white; border: 1.5px solid var(--border); padding: 8px 18px; border-radius: 8px; cursor: pointer; font-weight: 700; color: #475569; transition: 0.2s; }
        .upload-box { background: white; padding: 50px; border: 2px dashed var(--na); border-radius: 24px; text-align: center; cursor: pointer; margin-bottom: 30px; box-shadow: var(--card-shadow); transition: 0.3s; }
        .upload-box.minimized { padding: 15px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 20px; border-style: solid; border-width: 1px; }
        .summary-section-main-title { font-weight: 900; font-size: 1.5rem; color: var(--dark); margin: 30px 0 20px; display: flex; align-items: center; gap: 10px; }
        .summary-section-main-title::before { content: ''; width: 4px; height: 24px; background: var(--danger); border-radius: 2px; }
        .summary-area-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 40px; }
        .summary-card { background: white; border: 1px solid var(--border); border-top: 5px solid var(--danger); padding: 25px; border-radius: 16px; box-shadow: var(--card-shadow); }
        .summary-card.ok { border-top-color: var(--success); }
        .summary-title { font-weight: 900; font-size: 1.3rem; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 15px; color: var(--primary); }
        .summary-badge-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 10px; }
        .badge { padding: 12px; border-radius: 10px; font-size: 0.85rem; font-weight: 700; display: flex; align-items: center; justify-content: center; cursor: pointer; background: var(--danger-light); color: var(--danger); transition: 0.2s; text-align: center; }
        .badge-checked { background: #f1f5f9 !important; color: var(--na) !important; text-decoration: line-through; opacity: 0.6; }
        .branch-name-header { background: var(--primary); color: white; padding: 10px 20px; border-radius: 8px; font-weight: 800; font-size: 1.1rem; margin-bottom: 25px; }
        .toggle-detail-btn { width: 100%; padding: 14px; margin-bottom: 12px; border-radius: 10px; border: 1px solid var(--border); background: white; font-weight: 700; cursor: pointer; display: flex; justify-content: space-between; }
        .toggle-detail-btn.active { background: var(--primary); color: white; }
        .detail-content { display: none; margin-bottom: 30px; }
        .detail-content.active { display: block; }
        .table-wrapper { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; box-shadow: var(--card-shadow); }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #f8fafc; color: #64748b; font-weight: 700; padding: 12px 8px; font-size: 0.8rem; }
        td { padding: 12px 6px; text-align: center; border-bottom: 1px solid #f8fafc; font-size: 0.85rem; }
        .st-name { font-weight: 800; color: var(--primary); background: #fcfdfe; width: 95px; border-right: 1px solid var(--border); }
        .critical-val { background: var(--danger) !important; color: white !important; font-weight: 800; }
        .bad-val { background: #fffbeb; color: #b45309; font-weight: 700; }
        .na-cell { background: #f8fafc; color: var(--na); font-style: italic; font-size: 0.75rem; }
        .season-info { padding: 15px; background: white; border: 1px solid var(--primary); border-left: 5px solid var(--primary); border-radius: 10px; font-weight: 600; margin-bottom: 25px; }
    </style>
</head>
<body>
    <div id="app-view">
        <header class="app-header">
            <div class="container header-inner">
                <div id="line-indicator" style="color: var(--primary); font-weight: 900; font-size: 1.3rem;">장비 가동 일보 통합 분석</div>
                <button class="back-btn" onclick="location.reload()">↺ 분석 초기화</button>
            </div>
        </header>
        <main class="container">
            <section id="main-content" style="margin-top: 30px;">
                <div id="season-banner" class="season-info" style="display:none;"></div>
                <div id="upload-container" class="upload-box" onclick="document.getElementById('excelFile').click()">
                    <input type="file" id="excelFile" hidden />
                    <div style="font-size: 4rem; margin-bottom: 15px;">📊</div>
                    <h3 style="margin:0; color: var(--primary); font-size: 1.8rem; font-weight: 900;">가동일보 업로드</h3>
                    <p style="color:#64748b; margin-top:10px; font-weight:600;">파일(가동시간/장비 시트)을 선택하세요</p>
                </div>
                <div id="summary-area"></div>
                <div id="full-list-area"></div>
            </section>
        </main>
    </div>

<script>
/**
 * [환경 설정 및 기준 데이터]
 */
const GLOBAL_CONFIG = {
    BRANCHES: {
        line1: {
            left: { name: "송현기계분소", stations: ["설화명곡", "화원", "대곡", "진천", "월배", "상인", "월촌", "송현", "서부정류장", "대명", "안지랑", "현충로", "영대병원", "교대", "명덕", "반월당", "중앙로"] },
            right: { name: "동대구기계분소", stations: ["대구역", "칠성시장", "신천", "동대구", "동구청", "아양교", "동촌", "해안", "방촌", "용계", "율하", "신기", "반야월", "각산", "안심"] }
        },
        line2: {
            left: { name: "문양기지기계분소", stations: ["문양", "다사", "대실", "강창", "계명대", "성서산단", "성서산업단지", "이곡", "용산", "죽전", "감삼", "두류", "내당", "반고개", "청라언덕"] },
            right: { name: "사월기계분소", stations: ["반월당", "경대병원", "대구은행", "범어", "수성구청", "만촌", "담티", "연호", "수성알파시티", "수성알파", "대공원", "고산", "신매", "사월", "정평", "임당", "영남대", "영대"] }
        }
    },
    NO_EQUIP: { "문양": ["공조기", "송풍기", "냉동기", "공기청정기"], "다사": ["상부배기", "하부배기"], "대실": ["상부배기", "하부배기"] },
    ST_NOR_TYPE: { "명덕": 1, "청라언덕": 1, "반월당": 1, "현충로": 2, "중앙로": 2, "안심": 2, "다사": 2, "두류": 2, "담티": 2, "영남대": 2, "영대": 2, "반월당(1호선)": 3 },
    ST_COOL_TYPE: { "화원": 1, "반야월": 1, "각산": 1, "대곡": 2, "월촌": 2, "송현": 2, "교대": 2, "명덕": 2, "동구청": 2, "방촌": 2, "용계": 2, "율하": 2, "신기": 2 },
    CHILLER_VALS: {
        "설화명곡":6.0, "화원":6.0, "대곡":6.0, "진천":5.5, "월배":5.5, "상인":11.5, "월촌":5.5, "송현":5.5, "서부정류장":10.0, "대명":5.5, "안지랑":5.5, "현충로":5.5, "영대병원":6.0, "교대":7.0, "명덕":6.0, "반월당":11.5, "중앙로":14.5, "대구역":6.0, "칠성시장":5.5, "신천":5.5, "동대구":11.5, "동구청":5.5, "아양교":6.0, "동촌":5.5, "해안":5.5, "방촌":6.0, "용계":5.5, "율하":6.0, "신기":5.5, "반야월":5.5, "각산":6.0, "안심":11.5,
        "다사":4.0, "대실":4.5, "강창":4.5, "계명대":4.5, "성서산단":4.5, "성서산업단지":4.5, "이곡":4.5, "용산":6.0, "죽전":6.0, "감삼":6.0, "두류":6.0, "내당":6.5, "반고개":6.0, "청라언덕":6.5, "반월당(2호선)":12.0, "경대병원":6.0, "대구은행":6.0, "범어":5.5, "수성구청":5.0, "만촌":4.5, "담티":5.0, "연호":5.0, "수성알파시티":5.0, "수성알파":5.0, "고산": 6.5, "신매": 5.5, "사월": 6.0, "정평": 5.5, "임당": 4.5, "영남대": 4.5
    }
};

let isCooling = false, currentLine = '', ventSeason = '';

/**
 * [핵심 파서] 5:24 오류 방지
 */
function parseH(v) { 
    if(!v || v === "N/A" || v === "-" || v === "0") return 0;
    let s = String(v).trim();
    if(s.includes(':')) {
        const p = s.split(':');
        return (parseInt(p[0])||0) + (parseInt(p[1])||0)/60 + (parseInt(p[2])||0)/3600;
    }
    const n = parseFloat(s);
    if(isNaN(n)) return 0;
    return (n > 0 && n <= 1.0) ? n * 24 : n;
}

function getCV(s, r, c) { 
    if(!s) return ""; 
    const cell = s[XLSX.utils.encode_cell({r:r, c:c})]; 
    return cell ? (cell.w ? cell.w : (cell.v !== undefined ? String(cell.v) : "")) : ""; 
}

/**
 * [판정 로직]
 */
function analyzeHVAC(val, st, type) {
    if (GLOBAL_CONFIG.NO_EQUIP[st] && (GLOBAL_CONFIG.NO_EQUIP[st].includes("공조기") || GLOBAL_CONFIG.NO_EQUIP[st].includes(type))) return { s: 'none', c: '' };
    if (!val || val === "N/A") return { s: 'none', c: '' };
    const h = parseH(val);
    const cleanSt = st.replace(/\s+/g,"");

    if (!isCooling) {
        const sk = (cleanSt === "반월당" && currentLine === 'line1') ? "반월당(1호선)" : cleanSt;
        const tNum = GLOBAL_CONFIG.ST_NOR_TYPE[sk] || 4;
        const target = (tNum === 1) ? 17 : (tNum === 2 ? 15 : (tNum === 3 ? 15.5 : 16.5));
        if (type === 'supply') {
            if (Math.abs(h - target) >= 5) return { s: 'critical', c: 'critical-val' };
            return (h >= 15 && h <= 18) ? { s: 'ok', c: '' } : { s: 'warning', c: 'bad-val' };
        } else {
            return (h <= (10/60)) ? { s: 'critical', c: 'critical-val' } : (h <= 0.5 ? { s: 'warning', c: 'bad-val' } : { s: 'ok', c: '' });
        }
    } else {
        const tNum = GLOBAL_CONFIG.ST_COOL_TYPE[cleanSt] || (GLOBAL_CONFIG.CHILLER_VALS[cleanSt] ? 4 : 3);
        const target = GLOBAL_CONFIG.CHILLER_VALS[cleanSt] || 9.0;
        if (tNum === 1) {
            if (type === 'supply') {
                if (Math.abs(h - 12) >= 4) return { s: 'critical', c: 'critical-val' };
                return (h >= 10 && h <= 13) ? { s: 'ok', c: '' } : { s: 'warning', c: 'bad-val' };
            } else { return h <= (10/60) ? { s: 'critical', c: 'critical-val' } : { s: 'ok', c: '' }; }
        } else if (tNum === 2 || tNum === 3) {
            if (type === 'supply') {
                return (h >= 7.5 && h <= 10.5) ? { s: 'ok', c: '' } : { s: 'warning', c: 'bad-val' };
            } else { return h <= (10/60) ? { s: 'critical', c: 'critical-val' } : { s: 'ok', c: '' }; }
        } else if (tNum === 4) {
            if (Math.abs(h - target) > 2) return { s: 'critical', c: 'critical-val' };
            return { s: 'ok', c: '' };
        }
    }
    return { s: 'ok', c: '' };
}

function analyzeVent(val, isR, st) {
    if (GLOBAL_CONFIG.NO_EQUIP[st] && GLOBAL_CONFIG.NO_EQUIP[st].includes("송풍기")) return { s: 'none', c: '' };
    if (!val || val === "N/A") return { s: 'none', c: '' };
    const h = parseH(val);
    const cSt = st.replace(/\s+/g,"").replace("(2)","");
    if (cSt === "대실" || cSt === "범어") {
        const limit = (ventSeason === '하절기') ? 20 : 5;
        return (h >= limit) ? { s: 'critical', c: 'critical-val' } : { s: 'ok', c: '' };
    }
    let target = (ventSeason === '간절기') ? 3 : (ventSeason === '하절기' ? (isR ? 10.8 : 9.8) : 2);
    if (ventSeason === '하절기') {
        if (["명덕","연호","임당","영남대","영대"].some(s => cSt.includes(s)) && isR) target = 17.8;
        if (cSt === "고산" && isR) target = 6.5;
        if (cSt === "신매" && !isR) target = 5.5;
        if (cSt === "정평" && isR) target = 5.5;
        if (cSt === "이곡") target = 4.5;
    }
    const list19h = ["중앙로", "칠성시장", "방촌", "수성알파", "수성구청", "송현", "연호", "반월당"];
    if (list19h.some(s => cSt.includes(s))) {
        if (cSt === "반월당") target = 19;
        else if (cSt === "중앙로" && isR) target = 19;
        else if ((cSt === "칠성시장" || cSt === "방촌") && !isR) target = 19;
        else if ((cSt === "수성알파" || cSt === "송현" || cSt === "연호") && isR) target = 19;
    }
    if (h === 0 || Math.abs(h - target) >= 2) return { s: 'critical', c: 'critical-val' };
    return (h >= target - 0.1 && h <= target + 0.1) ? { s: 'ok', c: '' } : { s: 'warning', c: 'bad-val' };
}

/**
 * [추출 모듈]
 */
const Line1Processor = {
    getHVAC(s) {
        const d = []; if(!s) return d;
        const allSt = GLOBAL_CONFIG.BRANCHES.line1.left.stations.concat(GLOBAL_CONFIG.BRANCHES.line1.right.stations);
        allSt.forEach((st, idx) => {
            let r, c = idx + 4; let raw = [];
            if (st === "설화명곡" || st === "화원") {
                c = (st === "설화명곡") ? 4 : 5;
                raw = [getCV(s, 80, c), getCV(s, 81, c), getCV(s, 88, c), getCV(s, 89, c)];
            } else { raw = [getCV(s, 4, c), getCV(s, 5, c), getCV(s, 12, c), getCV(s, 13, c)]; }
            const res = raw.map((v, i) => analyzeHVAC(v, st, i % 2 === 0 ? 'supply' : 'exhaust'));
            d.push({ name: st, raw, res, isCri: res.some(r => r.s === 'critical') });
        }); return d;
    },
    getVent(s) {
        const d = []; if(!s) return d;
        const allSt = GLOBAL_CONFIG.BRANCHES.line1.left.stations.concat(GLOBAL_CONFIG.BRANCHES.line1.right.stations);
        allSt.forEach((st, idx) => {
            let c = idx + 4, raw = [];
            if (st === "설화명곡" || st === "화원") {
                c = (st === "설화명곡") ? 4 : 5;
                raw = [getCV(s, 97, c), getCV(s, 98, c), getCV(s, 99, c), getCV(s, 100, c)];
            } else { raw = [getCV(s, 19, c), getCV(s, 20, c), getCV(s, 21, c), getCV(s, 22, c)]; }
            const res = [analyzeVent(raw[0], false, st), analyzeVent(raw[1], false, st), analyzeVent(raw[2], true, st), analyzeVent(raw[3], true, st)];
            d.push({ name: st, raw, res, isCri: res.some(r => r.s === 'critical') });
        }); return d;
    },
    getChiller(s) {
        const d = []; if(!s) return d;
        [{n:"설화명곡",c:5},{n:"화원",c:4}].forEach(st => {
            const v1 = parseH(getCV(s, 154, st.c)), v2 = parseH(getCV(s, 155, st.c));
            const sumV = v1 + v2;
            d.push({ name: st.n, raw: [sumV], res: [analyzeChiller(sumV, st.n)], isCri: analyzeChiller(sumV, st.n).s === 'critical' });
        });
        GLOBAL_CONFIG.L1_ST_LIST.forEach((st, i) => {
            if (st === "설화명곡" || st === "화원") return;
            const v = parseH(getCV(s, 56, i + 4));
            d.push({ name: st, raw: [v], res: [analyzeChiller(v, st)], isCri: analyzeChiller(v, st).s === 'critical' });
        }); return d;
    }
};

const Line2Processor = {
    getHVAC(s) {
        const d = []; if(!s) return d; const rg = XLSX.utils.decode_range(s['!ref']);
        const allSt = GLOBAL_CONFIG.BRANCHES.line2.left.stations.concat(GLOBAL_CONFIG.BRANCHES.line2.right.stations);
        allSt.forEach(stName => {
            const mn = stName.replace(/\s+/g,""); let fR = -1;
            for (let r = 0; r <= 500; r++) {
                let t = (getCV(s, r, 0) + getCV(s, r, 1)).replace(/\s+/g, "");
                if (t.includes(mn) && (t.includes("가동") || t.length < 15)) { fR = r; break; }
            }
            if (fR !== -1) {
                let cur = { name: stName, ls: null, lue: null, lle: null, rs: null, rue: null, rle: null };
                for (let r = fR; r < fR + 40; r++) {
                    let txt = getCV(s, r, 0) + getCV(s, r, 1) + getCV(s, r, 2);
                    if (txt.includes("승강장") || txt.includes("급기") || txt.includes("배기")) {
                        let v = getCV(s, r, 4); let isL = txt.includes("좌") || txt.includes("시점") || txt.includes("시하");
                        if (txt.includes("급기")) { if (isL) cur.ls = v; else cur.rs = v; }
                        else if (txt.includes("배기")) { if (txt.includes("하부")) { if (isL) cur.lle = v; else cur.rle = v; } else { if (isL) cur.lue = v; else cur.rue = v; } }
                    }
                }
                const raw = [cur.ls, cur.lue, cur.lle, cur.rs, cur.rue, cur.rle];
                const res = raw.map((v, i) => analyzeHVAC(v, stName, (i < 3 ? 'supply' : 'exhaust')));
                d.push({ name: stName, raw, res, isCri: res.some(r => r.s === 'critical') });
            }
        }); return d;
    },
    getVent(s) {
        const d = []; if(!s) return d;
        const allSt = GLOBAL_CONFIG.BRANCHES.line2.left.stations.concat(GLOBAL_CONFIG.BRANCHES.line2.right.stations);
        allSt.forEach(st => {
            let fR = -1; for (let r = 0; r <= 500; r++) { if (getCV(s, r, 0).includes(st)) { fR = r; break; } }
            if (fR !== -1) {
                let units = [];
                for (let r = fR; r < fR + 40; r++) {
                    [1, 6, 11].forEach(c => {
                        let nm = getCV(s, r, c); if (nm.includes("환기실")) units.push({ l: nm.replace("환기실", "").trim(), v: getCV(s, r, c + 3) });
                    });
                }
                const raw = units.slice(0, 4).map(u => u.v);
                d.push({ name: st, raw, res: raw.map((v, i) => analyzeVent(v, i >= 2, st)), unitNames: units.slice(0, 4).map(u => u.l), isCri: false });
                d[d.length-1].isCri = d[d.length-1].res.some(r => r.s === 'critical');
            }
        }); return d;
    },
    getChiller(s) {
        const d = []; if(!s) return d;
        const allSt = GLOBAL_CONFIG.BRANCHES.line2.left.stations.concat(GLOBAL_CONFIG.BRANCHES.line2.right.stations);
        allSt.forEach(st => {
            let tot = 0, found = false;
            for (let r = 0; r <= 600; r++) {
                let t = getCV(s, r, 0) + getCV(s, r, 1);
                if (t.includes(st)) {
                    for (let sub = r; sub < r + 40; sub++) {
                        let stxt = getCV(s, sub, 0) + getCV(s, sub, 1);
                        if (stxt.includes("냉동기")) { tot += parseH(getCV(s, sub, 4)); found = true; }
                    } break;
                }
            }
            if (found) d.push({ name: st, raw: [tot], res: [analyzeChiller(tot, st)], isCri: analyzeChiller(tot, st).s === 'critical' });
        }); return d;
    }
};

/**
 * [메인 프로세스]
 */
document.getElementById('excelFile').addEventListener('change', function(e) {
    const file = e.target.files[0]; if(!file) return;
    currentLine = (file.name.includes("2호선") || file.name.includes("L2") || file.name.includes("일보")) ? 'line2' : 'line1';
    const reader = new FileReader();
    reader.onload = (evt) => {
        try {
            const wb = XLSX.read(evt.target.result, { type: 'binary', cellDates: false });
            const dm = file.name.match(/\d{8}/);
            let m = dm ? parseInt(dm[0].substring(4,6)) : 1, d = dm ? parseInt(dm[0].substring(6,8)) : 1;
            
            document.getElementById('line-indicator').innerText = `${m}월 ${d}일 가동일보 분석 결과`;
            isCooling = (m === 7 || m === 8 || (m === 9 && d <= 20));
            ventSeason = CONFIG.VENT_SEASON.INTER.includes(m) ? '간절기' : (CONFIG.VENT_SEASON.SUMMER.includes(m) ? '하절기' : '동절기');
            
            const banner = document.getElementById('season-banner');
            banner.style.display = 'block';
            banner.innerHTML = `🧊 <strong>공조 기준:</strong> ${isCooling?'냉방':'비냉방'} | 🌪️ <strong>환기 기준:</strong> ${ventSeason} (${m}월 ${d}일 일보)`;

            const findS = (names) => {
                for(let n of names) {
                    let sheet = wb.SheetNames.find(sn => sn.replace(/\s+/g,"") === n);
                    if(sheet) return wb.Sheets[sheet];
                }
                return wb.Sheets[wb.SheetNames[0]];
            };

            const hSheet = (currentLine === 'line1') ? findS(["가동시간"]) : findS(["장비"]);
            const aSheet = findS(["청정기", "공기청정기", "공기"]) || hSheet;

            const hData = (currentLine === 'line1') ? Line1Processor.getHVAC(hSheet) : Line2Processor.getHVAC(hSheet);
            const vData = (currentLine === 'line1') ? Line1Processor.getVent(hSheet) : Line2Processor.getVent(hSheet);
            const cData = isCooling ? ((currentLine === 'line1') ? Line1Processor.getChiller(hSheet) : Line2Processor.getChiller(hSheet)) : [];
            
            // 공기청정기 처리
            const aData = [];
            const allSt = GLOBAL_CONFIG.BRANCHES[currentLine].left.stations.concat(GLOBAL_CONFIG.BRANCHES[currentLine].right.stations);
            allSt.forEach((st, idx) => {
                if (currentLine === 'line1') {
                    let r = (st === "설화명곡" || st === "화원") ? 179 : 75;
                    let c = (st === "설화명곡") ? 5 : (st === "화원" ? 4 : (GLOBAL_CONFIG.L1_ST_LIST.indexOf(st) + 4));
                    let v = getCV(aSheet, r, c);
                    if(parseH(v) > 0) aData.push({ name: st, units: [{ label: "01호기", val: v, res: { s: parseH(v) < 15 || parseH(v) > 18 ? 'critical' : 'ok', c: parseH(v) < 15 || parseH(v) > 18 ? 'critical-val' : '' } }], isCri: parseH(v) < 15 || parseH(v) > 18 });
                } else {
                    let fR = -1; for(let r=0; r<=500; r++) { if(getCV(aSheet, r, 0).includes(st)) { fR=r; break; } }
                    if(fR !== -1) {
                        let units = [];
                        for(let i=5; i<=35; i++) {
                            [4, 9].forEach(col => {
                                let v = getCV(aSheet, fR+i, col); if(parseH(v) > 0 && v !== '-') {
                                    let res = parseH(v) < 15 || parseH(v) > 18 ? 'critical' : 'ok';
                                    units.push({ label: (units.length+1)+"호기", val: v, res: { s: res, c: res==='critical'?'critical-val':'' } });
                                }
                            });
                        }
                        if(units.length > 0) aData.push({ name: st, units, isCri: units.some(u => u.res.s === 'critical') });
                    }
                }
            });

            renderAll(hData, aData, vData, cData);
            document.getElementById('upload-container').classList.add('minimized');
        } catch(e) { alert("파일 분석 중 오류가 발생했습니다. 시트 구성을 확인해주세요."); console.error(e); }
    };
    reader.readAsBinaryString(file);
});

function formatToHMS(v) { 
    if(!v || v === "N/A" || v === "0") return "0:00:00";
    let ts = Math.round(parseH(v) * 3600);
    const h = Math.floor(ts / 3600), m = Math.floor((ts % 3600) / 60), s = ts % 60;
    return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
}

function renderAll(hvac, air, vent, chiller) {
    const b = CONFIG.BRANCHES[currentLine];
    const hL = currentLine === 'line1' ? ["시급", "시배", "종급", "종배"] : ["시급", "시상", "시하", "종급", "종상", "종하"];
    const buildS = (br) => {
        const cH = hvac.filter(d => br.stations.includes(d.name) && d.isCri);
        const cA = air.filter(d => br.stations.includes(d.name) && d.isCri);
        const cV = vent.filter(d => br.stations.includes(d.name) && d.isCri);
        const cC = chiller.filter(d => br.stations.includes(d.name) && d.isCri);
        const isOk = (cH.length + cA.length + cV.length + cC.length === 0);
        let h = `<div class="summary-card ${isOk?'ok':''}"> <div class="summary-title">📍 ${br.name}</div>`;
        if (isOk) return h + `<div style="color:var(--success); font-weight:800;">✅ 모든 장비 정상</div></div>`;
        const addB = (title, data, labels, type) => {
            if (data.length === 0) return "";
            let s = `<span class="summary-group-label">${title}</span><div class="summary-badge-container">`;
            data.forEach(d => { d.res.forEach((r, i) => { if (r.s === 'critical') {
                const lbl = (type==='vent'&&currentLine==='line2'?(d.unitNames?d.unitNames[i]:labels[i]):(type==='chiller'?"냉동기":labels[i]));
                s += `<span class="badge" onclick="toggleBadge(this)">${d.name} ${lbl} (${formatToHMS(d.raw[i])})</span> `;
            } }); }); return s + `</div>`;
        };
        h += addB('[승강장 공조기]', cH, hL, 'hvac');
        h += addB('[환기실 송풍기]', cV, ["시급","시배","종급","종배"], 'vent');
        h += addB('[냉동기]', cC, ["냉동기"], 'chiller');
        if (cA.length > 0) {
            h += `<span class="summary-group-label">[공기청정기]</span><div class="summary-badge-container">`;
            cA.forEach(d => { d.units.forEach(u => { if (u.res.s === 'critical') h += `<span class="badge" onclick="toggleBadge(this)">${d.name} ${u.label} (${formatToHMS(u.val)})</span> `; }); });
            h += `</div>`;
        }
        return h + `</div>`;
    };
    document.getElementById('summary-area').innerHTML = `<h2 class="summary-section-main-title">⚠️ 확인 필요 호기</h2><div class="summary-area-grid">${buildS(b.left)}${buildS(b.right)}</div>`;
    const buildCol = (br, side) => {
        const sH = hvac.filter(d => br.stations.includes(d.name)); const sV = vent.filter(d => br.stations.includes(d.name));
        const sA = air.filter(d => br.stations.includes(d.name)); const sC = chiller.filter(d => br.stations.includes(d.name));
        return `<div class="branch-column"><div class="branch-name-header">${br.name}</div>
            <div class="section-title">📊 승강장 공조기</div><button class="toggle-detail-btn" onclick="toggleDetail(this,'${side}h','공조기')"><span>상세내역</span><span>▾</span></button><div id="${side}h" class="detail-content">${buildT(sH, hL)}</div>
            <div class="section-title">🌪️ 환기실 송풍기</div><button class="toggle-detail-btn" onclick="toggleDetail(this,'${side}v','송풍기')"><span>상세내역</span><span>▾</span></button><div id="${side}v" class="detail-content">${buildT(sV, ["시급","시배","종급","종배"])}</div>
            <div class="section-title">❄️ 냉동기</div><button class="toggle-detail-btn" onclick="toggleDetail(this,'${side}c','냉동기')"><span>상세내역</span><span>▾</span></button><div id="${side}c" class="detail-content">${buildT(sC, ["냉동기"])}</div>
            <div class="section-title">🌬️ 공기청정기</div><button class="toggle-detail-btn" onclick="toggleDetail(this,'${side}a','청정기')"><span>상세내역</span><span>▾</span></button><div id="${side}a" class="detail-content">${buildAT(sA)}</div></div>`;
    };
    document.getElementById('full-list-area').innerHTML = `<div class="equipment-row">${buildCol(b.left,'l')}${buildCol(b.right,'r')}</div>`;
}

function buildT(data, L) {
    if (!data || data.length === 0) return "<p style='padding:20px; color:var(--na); text-align:center;'>데이터 없음</p>";
    let h = `<div class="table-wrapper"><table><thead><tr><th>역사</th>${L.map(l=>`<th>${l}</th>`).join('')}<th>판정</th></tr></thead><tbody>`;
    data.forEach(d => { 
        const isNA = d.res.every(r => r.s === 'none');
        h += `<tr><td class="st-name">${d.name}</td>`;
        for (let i=0; i<L.length; i++) { h += `<td class="${d.res[i].s==='none'?'na-cell':d.res[i].c}">${formatToHMS(d.raw[i])}</td>`; }
        h += `<td><span style="font-weight:800; color:${isNA?'var(--na)':(d.isCri?'var(--danger)':'var(--success)')}">${isNA?'해당없음':(d.isCri?'이상':'정상')}</span></td></tr>`;
    }); return h + `</tbody></table></div>`;
}

function buildAT(data) {
    if (!data || data.length === 0) return "<p style='padding:20px; color:var(--na); text-align:center;'>데이터 없음</p>";
    let h = `<div class="table-wrapper"><table><thead><tr><th style="width:90px;">역사</th><th>장비 상세</th></tr></thead><tbody>`;
    data.forEach(d => { 
        h += `<tr><td class="st-name">${d.name}</td><td><div class="units-grid">`;
        d.units.forEach(u => { h += `<div class="unit-box ${u.res.c}"><strong>${u.label}</strong><div class="unit-time">${formatToHMS(u.val)}</div></div>`; });
        if(CONFIG.NO_EQUIP[d.name] && CONFIG.NO_EQUIP[d.name].includes("공기청정기")) h += `<div style="color:var(--na); font-style:italic; padding:10px;">해당없음</div>`;
        h += `</div></td></tr>`;
    }); return h + `</tbody></table></div>`;
}
</script>
