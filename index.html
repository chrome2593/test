<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1·2호선 가동일보 통합 분석 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        
        :root {
            --primary: #004595;
            --primary-light: #eef4ff;
            --dark: #1e293b;
            --bg-light: #f1f5f9;
            --danger: #e11d48;
            --danger-light: #fff1f2;
            --warning: #f59e0b;
            --success: #10b981;
            --border: #e2e8f0;
            --na: #94a3b8;
            --card-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        body { 
            margin: 0; 
            font-family: 'Pretendard', sans-serif; 
            background: var(--bg-light); 
            color: var(--dark); 
            overflow-y: scroll;
            line-height: 1.6;
        }

        .container { max-width: 1500px; margin: 0 auto; padding: 0 20px; }

        /* 헤더 디자인 */
        .app-header { 
            background: white; 
            border-bottom: 2px solid var(--primary); 
            padding: 12px 0; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            box-shadow: 0 2px 15px rgba(0,0,0,0.05); 
        }
        .header-inner { display: flex; justify-content: space-between; align-items: center; }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-dot { width: 12px; height: 12px; background: var(--primary); border-radius: 50%; }

        .back-btn { 
            background: white; 
            border: 1.5px solid var(--border); 
            padding: 8px 18px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 700; 
            color: #475569;
            transition: 0.2s;
        }
        .back-btn:hover { background: var(--bg-light); border-color: var(--na); }

        /* 업로드 박스 */
        .upload-box { 
            background: white; 
            padding: 50px; 
            border: 2px dashed var(--na); 
            border-radius: 24px; 
            text-align: center; 
            cursor: pointer; 
            margin-bottom: 30px; 
            transition: all 0.3s ease;
            box-shadow: var(--card-shadow);
        }
        .upload-box:hover { border-color: var(--primary); background: var(--primary-light); transform: translateY(-2px); }
        .upload-box.minimized { padding: 15px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 20px; border-style: solid; border-width: 1px; }

        /* 요약 카드 섹션 */
        .summary-section-main-title { 
            font-weight: 900; 
            font-size: 1.5rem; 
            color: var(--dark); 
            margin: 30px 0 20px; 
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .summary-section-main-title::before { content: ''; width: 4px; height: 24px; background: var(--danger); border-radius: 2px; }

        .summary-area-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-bottom: 40px; }
        .summary-card { 
            background: white; 
            border: 1px solid var(--border);
            border-top: 5px solid var(--danger); 
            padding: 25px; 
            border-radius: 16px; 
            box-shadow: var(--card-shadow);
            transition: 0.3s;
        }
        .summary-card.ok { border-top-color: var(--success); background: #ffffff; }
        .summary-title { font-weight: 900; font-size: 1.3rem; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 15px; color: var(--primary); }
        .summary-group-label { font-weight: 800; font-size: 0.95rem; color: #64748b; margin: 15px 0 8px 0; display: block; text-transform: uppercase; letter-spacing: 0.5px; }

        .summary-badge-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 10px; }
        .badge { 
            padding: 12px; 
            border-radius: 10px; 
            font-size: 0.85rem; 
            font-weight: 700; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            border: 1px solid transparent; 
            text-align: center; 
            background: var(--danger-light); 
            color: var(--danger);
            box-shadow: 0 2px 4px rgba(225, 29, 72, 0.05);
            transition: 0.2s;
        }
        .badge:hover { transform: scale(1.02); filter: brightness(0.95); }
        .badge-checked { background: #f1f5f9 !important; color: var(--na) !important; border-color: var(--border) !important; text-decoration: line-through; opacity: 0.6; }

        /* 상세 리스트 레이아웃 */
        .equipment-row { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 60px; }
        .branch-column { display: flex; flex-direction: column; width: 100%; }
        .branch-name-header { 
            background: var(--primary); 
            color: white; 
            padding: 10px 20px; 
            border-radius: 8px; 
            font-weight: 800; 
            font-size: 1.1rem; 
            margin-bottom: 25px; 
            box-shadow: 0 4px 10px rgba(0,69,149,0.2);
        }

        .toggle-detail-btn { 
            width: 100%; 
            padding: 14px; 
            margin-bottom: 12px; 
            border-radius: 10px; 
            border: 1px solid var(--border); 
            background: white; 
            color: var(--dark); 
            font-weight: 700; 
            font-size: 0.95rem; 
            cursor: pointer; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s;
        }
        .toggle-detail-btn:hover { background: var(--primary-light); color: var(--primary); }
        .toggle-detail-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .detail-content { display: none; margin-bottom: 30px; animation: fadeIn 0.3s ease; }
        .detail-content.active { display: block; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .section-title { font-weight: 800; font-size: 1.1rem; color: var(--primary); margin: 20px 0 10px 5px; display: flex; align-items: center; gap: 8px; }

        /* 테이블 디자인 */
        .table-wrapper { background: white; border-radius: 12px; border: 1px solid var(--border); overflow: hidden; box-shadow: var(--card-shadow); margin-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #f8fafc; color: #64748b; font-weight: 700; padding: 12px 8px; border-bottom: 1px solid var(--border); font-size: 0.8rem; }
        td { padding: 12px 6px; text-align: center; border-bottom: 1px solid #f8fafc; font-size: 0.85rem; font-weight: 500; }
        .st-name { font-weight: 800; color: var(--primary); background: #fcfdfe; width: 95px; border-right: 1px solid var(--border); }
        
        .critical-val { background: var(--danger) !important; color: white !important; font-weight: 800; }
        .bad-val { background: #fffbeb; color: #b45309; font-weight: 700; }
        .na-cell { background: #f8fafc; color: var(--na); font-style: italic; font-size: 0.75rem; }

        /* 공기청정기 그리드 */
        .units-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; padding: 12px; }
        .unit-box { 
            display: flex; flex-direction: column; align-items: center; 
            padding: 8px; border: 1px solid var(--border); border-radius: 8px; 
            background: #ffffff; transition: 0.2s;
        }
        .unit-box strong { font-size: 0.7rem; color: #64748b; margin-bottom: 2px; }
        .unit-time { font-size: 0.85rem; font-weight: 700; color: var(--dark); }

        .season-info { 
            padding: 15px; background: white; border: 1px solid var(--primary); 
            border-left: 5px solid var(--primary); border-radius: 10px; 
            text-align: left; font-weight: 600; color: var(--dark); 
            margin-bottom: 25px; box-shadow: var(--card-shadow);
        }
    </style>
</head>
<body>
    <div id="app-view">
        <header class="app-header">
            <div class="container header-inner">
                <div class="logo-area">
                    <div class="logo-dot"></div>
                    <div id="line-indicator" style="color: var(--primary); font-weight: 900; font-size: 1.3rem;">장비 가동 일보 통합 분석</div>
                </div>
                <button class="back-btn" onclick="location.reload()">↺ 분석 초기화</button>
            </div>
        </header>
        <main class="container">
            <section id="main-content" style="margin-top: 30px;">
                <div id="season-banner" class="season-info" style="display:none;"></div>
                <div id="upload-container" class="upload-box" onclick="document.getElementById('excelFile').click()">
                    <input type="file" id="excelFile" hidden />
                    <div style="font-size: 4rem; margin-bottom: 15px;">📄</div>
                    <h3 style="margin:0; color: var(--primary); font-size: 1.8rem; font-weight: 900;">가동일보 업로드</h3>
                    <p style="color:#64748b; margin-top:10px; font-weight:600;">드림스 가동일보(1·2호선) 파일을 선택하세요</p>
                </div>
                <div id="summary-area"></div>
                <div id="full-list-area"></div>
            </section>
        </main>
    </div>

<script>
/** * [데이터 로직 - 기존과 동일함 (절대 수정 금지됨)]
 */
const CONFIG = {
    VENT_SEASON: { INTER: [3, 4, 5, 10], SUMMER: [6, 7, 8, 9], WINTER: [11, 12, 1, 2] },
    NORMAL_TARGETS: { "type1": 17, "type2": 15, "type3": 15.5, "type4": 16.5 },
    L2_NAME_MAP: { "수성알파시티": "수성알파", "영남대": "영대", "성서산업단지": "성서산단" },
    NO_EQUIP: { 
        "문양": ["공조기", "송풍기", "냉동기", "공기청정기"],
        "다사": ["상부배기", "하부배기"],
        "대실": ["상부배기", "하부배기"]
    },
    CHILLER_VALS: {
        "설화명곡":6.0, "화원":6.0, "대곡":6.0, "진천":5.5, "월배":5.5, "상인":11.5, "월촌":5.5, "송현":5.5, "서부정류장":10.0, "대명":5.5, "안지랑":5.5, "현충로":5.5, "영대병원":6.0, "교대":7.0, "명덕":6.0, "반월당":11.5, "중앙로":14.5, "대구역":6.0, "칠성시장":5.5, "신천":5.5, "동대구":11.5, "동구청":5.5, "아양교":6.0, "동촌":5.5, "해안":5.5, "방촌":6.0, "용계":5.5, "율하":6.0, "신기":5.5, "반야월":5.5, "각산":6.0, "안심":11.5,
        "다사":4.0, "대실":4.5, "강창":4.5, "계명대":4.5, "성서산단":4.5, "성서산업단지":4.5, "이곡":4.5, "용산":6.0, "죽전":6.0, "감삼":6.0, "두류":6.0, "내당":6.5, "반고개":6.0, "청라언덕":6.5, "반월당(2호선)":12.0, "경대병원":6.0, "대구은행":6.0, "범어":5.5, "수성구청":5.0, "만촌":4.5, "담티":5.0, "연호":5.0, "수성알파":5.0, "고산": 6.5, "신매": 5.5, "사월": 6.0, "정평": 5.5, "임당": 4.5, "영남대": 4.5
    },
    BRANCHES: {
        line1: {
            left: { name: "송현기계분소", stations: ["설화명곡", "화원", "대곡", "진천", "월배", "상인", "월촌", "송현", "서부정류장", "대명", "안지랑", "현충로", "영대병원", "교대", "명덕", "반월당", "중앙로"] },
            right: { name: "동대구기계분소", stations: ["대구역", "칠성시장", "신천", "동대구", "동구청", "아양교", "동촌", "해안", "방촌", "용계", "율하", "신기", "반야월", "각산", "안심"] }
        },
        line2: {
            left: { name: "문양기지기계분소", stations: ["문양", "다사", "대실", "강창", "계명대", "성서산단", "성서산업단지", "이곡", "용산", "죽전", "감삼", "두류", "내당", "반고개", "청라언덕"] },
            right: { name: "사월기계분소", stations: ["반월당", "경대병원", "대구은행", "범어", "수성구청", "만촌", "담티", "연호", "수성알파", "고산", "신매", "사월", "정평", "임당", "영남대"] }
        }
    },
    L1_ST_LIST: ["대곡", "진천", "월배", "상인", "월촌", "송현", "서부정류장", "대명", "안지랑", "현충로", "영대병원", "교대", "명덕", "반월당", "중앙로", "대구역", "칠성시장", "신천", "동대구", "동구청", "아양교", "동촌", "해안", "방촌", "용계", "율하", "신기", "반야월", "각산", "안심"],
    ST_NOR: { "명덕": "type1", "청라언덕": "type1", "반월당": "type1", "현충로": "type2", "중앙로": "type2", "안심": "type2", "다사": "type2", "두류": "type2", "담티": "type2", "영남대": "type2" },
    ST_COOL: { "화원": "type1", "반야월": "type1", "각산": "type1", "대곡":"type2", "월촌":"type2", "송현":"type2", "교대":"type2", "명덕":"type2", "동구청":"type2", "방촌":"type2", "용계":"type2", "율하":"type2", "신기":"type2" }
};

let currentLine = '', isCooling = false, ventSeason = '', isChillerSeason = false;

function toggleBadge(el) { el.classList.toggle('badge-checked'); }
function toggleDetail(btn, id, lbl) {
    const t = document.getElementById(id); if(!t) return;
    const act = t.classList.contains('active');
    t.classList.toggle('active'); btn.classList.toggle('active');
    btn.innerHTML = act ? `[${lbl}] 상세내역 ▾` : `[${lbl}] 닫기 ▴`;
}

function parseH(v) { 
    if(!v || v === "N/A" || v === "-" || v === "0") return 0;
    let s = String(v).trim();
    if(s.includes(':')) {
        const p = s.split(':');
        return (parseInt(p[0])||0) + (parseInt(p[1])||0)/60 + (parseInt(p[2])||0)/3600;
    }
    const n = parseFloat(s);
    if(isNaN(n)) return 0;
    return (n > 0 && n <= 1.0) ? n * 24 : n;
}

function getCV(s, r, c) { 
    if(!s) return ""; 
    const cell = s[XLSX.utils.encode_cell({r:r, c:c})]; 
    if(!cell) return "";
    return cell.w ? cell.w : (cell.v !== undefined ? String(cell.v) : ""); 
}

document.getElementById('excelFile').addEventListener('change', function(e) {
    const file = e.target.files[0]; if(!file) return;
    const fn = file.name;
    currentLine = (fn.includes("2호선") || fn.includes("L2") || fn.includes("일보")) ? 'line2' : 'line1';
    
    const reader = new FileReader();
    reader.onload = (evt) => {
        try {
            const wb = XLSX.read(evt.target.result, { type: 'binary', cellDates: false });
            let m = 0, d = 0; const dm = fn.match(/\d{8}/);
            if (dm) { m = parseInt(dm[0].substring(4, 6)); d = parseInt(dm[0].substring(6, 8)); }
            else { m=1; d=1; }
            document.getElementById('line-indicator').innerText = `${m}월 ${d}일 가동일보 분석 결과`;
            runAnalysis(wb, m, d);
            document.getElementById('upload-container').classList.add('minimized');
        } catch(err) {
            console.error(err);
            alert("파일 분석 중 오류가 발생했습니다. (파일 형식을 확인해주세요)");
        }
    };
    reader.readAsBinaryString(file);
});

function runAnalysis(wb, m, d) {
    isCooling = (m === 7) || (m === 8) || (m === 9 && d <= 20);
    isChillerSeason = isCooling;
    ventSeason = CONFIG.VENT_SEASON.INTER.includes(m) ? '간절기' : (CONFIG.VENT_SEASON.SUMMER.includes(m) ? '하절기' : '동절기');
    const banner = document.getElementById('season-banner');
    banner.style.display = 'block';
    banner.innerHTML = `🧊 <strong>공조 기준:</strong> ${isCooling?'냉방 가동':'비냉방'} | 🌪️ <strong>환기 기준:</strong> ${ventSeason} (${m}월 ${d}일 일보 기준)`;

    const hSheet = (currentLine === 'line1') ? wb.Sheets["가동시간"] : wb.Sheets["장비"];
    const aSheetName = wb.SheetNames.find(n => n.includes("청정기") || n.includes("공기"));
    const aSheet = wb.Sheets[aSheetName] || hSheet;

    if(!hSheet) {
        alert(`${currentLine==='line1'?'가동시간':'장비'} 시트를 찾을 수 없습니다.`);
        return;
    }

    const hData = (currentLine === 'line1') ? getL1H(hSheet) : getL2H(hSheet);
    const aData = getAP(aSheet);
    const vData = (currentLine === 'line1') ? getL1V(hSheet) : getL2V(hSheet);
    const cData = isChillerSeason ? ((currentLine === 'line1') ? getL1C(hSheet) : getL2C(hSheet)) : [];

    renderAll(hData, aData, vData, cData);
}

function analyzeHVAC(val, st, type) {
    if (CONFIG.NO_EQUIP[st] && (CONFIG.NO_EQUIP[st].includes("공조기") || CONFIG.NO_EQUIP[st].includes(type))) return { s: 'none', c: '' };
    if (val === "N/A" || val === "" || val === undefined) return { s: 'none', c: '' };
    const h = parseH(val);
    if (!isCooling) {
        const target = (st === "반월당" && currentLine === 'line1') ? 15.5 : (CONFIG.NORMAL_TARGETS[CONFIG.ST_NOR[st] || "type4"]);
        if (type === 'supply') {
            if (Math.abs(h - target) >= 5) return { s: 'critical', c: 'critical-val' };
            return (h >= 15 && h <= 18) ? { s: 'ok', c: '' } : { s: 'warning', c: 'bad-val' };
        } else {
            if (h <= (10/60)) return { s: 'critical', c: 'critical-val' };
            return (h <= 0.5) ? { s: 'warning', c: 'bad-val' } : { s: 'ok', c: '' };
        }
    } else {
        const ty = CONFIG.ST_COOL[st] || "type3";
        const target = (ty === "type1") ? 12 : 9;
        if (type === 'supply') {
            if (Math.abs(h - target) >= 4) return { s: 'critical', c: 'critical-val' };
            const range = (ty === "type1") ? (h >= 10 && h <= 13) : (h >= 7.5 && h <= 10.5);
            return range ? { s: 'ok', c: '' } : { s: 'warning', c: 'bad-val' };
        } else { return (h <= (10/60)) ? { s: 'critical', c: 'critical-val' } : { s: 'ok', c: '' }; }
    }
}

function analyzeVent(val, isR, st, unit = "") {
    if (CONFIG.NO_EQUIP[st] && CONFIG.NO_EQUIP[st].includes("송풍기")) return { s: 'none', c: '' };
    if (val === "N/A" || val === "") return { s: 'none', c: '' };
    const h = parseH(val);
    let target = (ventSeason === '간절기') ? 3 : (ventSeason === '하절기' ? (isR ? 10.8 : 9.8) : 2);
    if (st === "대실" || st === "범어") {
        const limit = (ventSeason === '하절기') ? 20 : 5;
        return (h >= limit) ? { s: 'warning', c: 'bad-val' } : { s: 'ok', c: '' };
    }
    const cSt = st.replace(/\s+/g,"").replace("(2)","");
    if (["중앙로", "칠성시장", "방촌", "수성알파", "수성구청", "송현", "연호", "반월당"].some(s => cSt.includes(s))) target = 19;
    if (h === 0 || Math.abs(h - target) >= 2) return { s: 'critical', c: 'critical-val' };
    return (h >= target - 0.1 && h <= target + 0.1) ? { s: 'ok', c: '' } : { s: 'warning', c: 'bad-val' };
}

function analyzeChiller(val, st) {
    if (CONFIG.NO_EQUIP[st] && CONFIG.NO_EQUIP[st].includes("냉동기")) return { s: 'none', c: '' };
    if (val === "N/A" || val === "" || val === undefined) return { s: 'none', c: '' };
    const h = val; 
    const stationKey = (st === "반월당" && currentLine === 'line2') ? "반월당(2호선)" : st;
    const target = CONFIG.CHILLER_VALS[stationKey] || 6.0;
    if (h === 0 || Math.abs(h - target) >= 3) return { s: 'critical', c: 'critical-val' };
    return (h >= target - 1 && h <= target + 1) ? { s: 'ok', c: '' } : { s: 'warning', c: 'bad-val' };
}

function renderAll(hvac, air, vent, chiller) {
    const b = CONFIG.BRANCHES[currentLine];
    const hL = currentLine === 'line1' ? ["시급", "시배", "종급", "종배"] : ["시급", "시상", "시하", "종급", "종상", "종하"];
    const buildS = (br) => {
        const cH = hvac.filter(d => br.stations.includes(d.name) && d.isCri);
        const cA = air.filter(d => br.stations.includes(d.name) && d.isCri);
        const cV = vent.filter(d => br.stations.includes(d.name) && d.isCri);
        const cC = chiller.filter(d => br.stations.includes(d.name) && d.isCri);
        const isOk = (cH.length + cA.length + cV.length + cC.length === 0);
        let h = `<div class="summary-card ${isOk?'ok':''}"> <div class="summary-title">📍 ${br.name}</div>`;
        if (isOk) return h + `<div style="color:var(--success); font-weight:800; padding:10px 0;">✅ 모든 장비 정상 가동 중</div></div>`;
        const addB = (title, data, labels, type) => {
            if (data.length === 0) return "";
            let s = `<span class="summary-group-label">${title}</span><div class="summary-badge-container">`;
            data.forEach(d => { d.res.forEach((r, i) => { if (r.s === 'critical') {
                const lbl = (type==='air')? d.units[i].label : (type==='vent'&&currentLine==='line2'?(d.unitNames?d.unitNames[i]:labels[i]):(type==='chiller'?"냉동기":labels[i]));
                s += `<span class="badge" onclick="toggleBadge(this)">${d.name} ${lbl} (${formatToHMS(d.raw[i])})</span> `;
            }});}); return s + `</div>`;
        };
        h += addB('[승강장 공조기]', cH, hL, 'hvac');
        h += addB('[환기실 송풍기]', cV, ["시급","시배","종급","종배"], 'vent');
        h += addB('[냉동기]', cC, ["냉동기"], 'chiller');
        if (cA.length > 0) {
            h += `<span class="summary-group-label">[공기청정기]</span><div class="summary-badge-container">`;
            cA.forEach(d => { d.units.forEach(u => { if (u.res.s === 'critical') h += `<span class="badge" onclick="toggleBadge(this)">${d.name} ${u.label} (${formatToHMS(u.val)})</span> `; }); });
            h += `</div>`;
        }
        return h + `</div>`;
    };
    document.getElementById('summary-area').innerHTML = `<h2 class="summary-section-main-title">⚠️ 확인 필요 호기 (클릭하여 조치 완료 표시)</h2><div class="summary-area-grid">${buildS(b.left)}${buildS(b.right)}</div>`;
    const buildCol = (br, side) => {
        const sH = hvac.filter(d => br.stations.includes(d.name)); const sV = vent.filter(d => br.stations.includes(d.name));
        const sA = air.filter(d => br.stations.includes(d.name)); const sC = chiller.filter(d => br.stations.includes(d.name));
        return `<div class="branch-column"><div class="branch-name-header">${br.name}</div>
            <div class="section-title">📊 승강장 공조기</div><button class="toggle-detail-btn" onclick="toggleDetail(this,'${side}h','승강장 공조기')">상세보기 ▾</button><div id="${side}h" class="detail-content">${buildT(sH, hL)}</div>
            <div class="section-title">🌪️ 환기실 송풍기</div><button class="toggle-detail-btn" onclick="toggleDetail(this,'${side}v','환기실 송풍기')">상세보기 ▾</button><div id="${side}v" class="detail-content">${buildT(sV, ["시급","시배","종급","종배"])}</div>
            ${isChillerSeason ? `<div class="section-title">❄️ 냉동기</div><button class="toggle-detail-btn" onclick="toggleDetail(this,'${side}c','냉동기')">상세보기 ▾</button><div id="${side}c" class="detail-content">${buildT(sC, ["냉동기"])}</div>` : ''}
            <div class="section-title">🌬️ 공기청정기</div><button class="toggle-detail-btn" onclick="toggleDetail(this,'${side}a','공기청정기')">상세보기 ▾</button><div id="${side}a" class="detail-content">${buildAT(sA)}</div></div>`;
    };
    document.getElementById('full-list-area').innerHTML = `<div class="equipment-row">${buildCol(b.left,'l')}${buildCol(b.right,'r')}</div>`;
}

function buildT(data, L) {
    if (!data || data.length === 0) return "<p style='padding:20px; color:var(--na); text-align:center;'>데이터 없음</p>";
    let h = `<div class="table-wrapper"><table><thead><tr><th>역사</th>${L.map(l=>`<th>${l}</th>`).join('')}<th>판정</th></tr></thead><tbody>`;
    data.forEach(d => { 
        const isNA = d.res.every(r => r.s === 'none');
        h += `<tr><td class="st-name">${d.name}</td>`;
        for (let i=0; i<L.length; i++) { 
            const v = d.raw[i], r = d.res[i] || {c:''};
            h += `<td class="${r.s==='none'?'na-cell':r.c}">${(v==="N/A"||v===undefined)?"-":formatToHMS(v)}</td>`; 
        }
        h += `<td><span style="font-weight:800; color:${isNA?'var(--na)':(d.isCri?'var(--danger)':'var(--success)')}">${isNA?'해당없음':(d.isCri?'이상':'정상')}</span></td></tr>`;
    }); return h + `</tbody></table></div>`;
}

function buildAT(data) {
    if (!data || data.length === 0) return "<p style='padding:20px; color:var(--na); text-align:center;'>데이터 없음</p>";
    let h = `<div class="table-wrapper"><table><thead><tr><th style="width:90px;">역사</th><th>장비 상세</th></tr></thead><tbody>`;
    data.forEach(d => { 
        const isNA = CONFIG.NO_EQUIP[d.name] && CONFIG.NO_EQUIP[d.name].includes("공기청정기");
        h += `<tr><td class="st-name">${d.name}</td><td><div class="units-grid">`;
        d.units.forEach(u => { h += `<div class="unit-box ${u.res.c}"><strong>${u.label}</strong><div class="unit-time">${formatToHMS(u.val)}</div></div>`; });
        if(isNA) h += `<div style="color:var(--na); font-style:italic; padding:10px; width:100%;">해당없음</div>`;
        h += `</div></td></tr>`;
    }); return h + `</tbody></table></div>`;
}

function getL1H(s) {
    const d = []; if(!s) return d;
    const allSt = CONFIG.BRANCHES.line1.left.stations.concat(CONFIG.BRANCHES.line1.right.stations);
    allSt.forEach((st, idx) => {
        let r, c = idx + 4;
        let raw = [];
        if (st === "설화명곡" || st === "화원") {
            c = (st === "설화명곡") ? 4 : 5;
            raw = [getCV(s, 80, c), getCV(s, 81, c), getCV(s, 88, c), getCV(s, 89, c)];
        } else {
            raw = [getCV(s, 4, c), getCV(s, 5, c), getCV(s, 12, c), getCV(s, 13, c)];
        }
        const res = raw.map((v, i) => analyzeHVAC(v, st, i % 2 === 0 ? 'supply' : 'exhaust'));
        d.push({ name: st, raw, res, isCri: res.some(r => r.s === 'critical') });
    });
    return d;
}

function getL1V(s) {
    const d = []; if(!s) return d;
    const allSt = CONFIG.BRANCHES.line1.left.stations.concat(CONFIG.BRANCHES.line1.right.stations);
    allSt.forEach((st, idx) => {
        let c = idx + 4, raw = [];
        if (st === "설화명곡" || st === "화원") {
            c = (st === "설화명곡") ? 4 : 5;
            raw = [getCV(s, 97, c), getCV(s, 98, c), getCV(s, 99, c), getCV(s, 100, c)];
        } else {
            raw = [getCV(s, 19, c), getCV(s, 20, c), getCV(s, 21, c), getCV(s, 22, c)];
        }
        const res = [analyzeVent(raw[0], false, st), analyzeVent(raw[1], false, st), analyzeVent(raw[2], true, st), analyzeVent(raw[3], true, st)];
        d.push({ name: st, raw, res, isCri: res.some(r => r.s === 'critical') });
    });
    return d;
}

function getL1C(s) {
    const d = []; if(!s) return d;
    [{n:"설화명곡",c:5},{n:"화원",c:4}].forEach(st => { 
        const v1 = parseH(getCV(s,154,st.c)); const v2 = parseH(getCV(s,155,st.c));
        const sumV = v1 + v2; d.push({name:st.n, raw:[sumV], res:[analyzeChiller(sumV, st.n)], isCri:analyzeChiller(sumV, st.n).s==='critical'});
    });
    CONFIG.L1_ST_LIST.forEach((n, i) => { 
        if(n === "설화명곡" || n === "화원") return;
        const v = parseH(getCV(s,56,i+4)); d.push({name:n, raw:[v], res:[analyzeChiller(v,n)], isCri:analyzeChiller(v,n).s==='critical'}); 
    }); return d;
}

function getL2H(s) {
    const d = []; if(!s) return d; const rg = XLSX.utils.decode_range(s['!ref']);
    const allSt = CONFIG.BRANCHES.line2.left.stations.concat(CONFIG.BRANCHES.line2.right.stations);
    allSt.forEach(stName => {
        const mn = stName.replace(/\s+/g,""); let fR = -1;
        for (let r=0; r<=rg.e.r; r++) {
            let t = (getCV(s,r,0)+getCV(s,r,1)+getCV(s,r,2)).replace(/\s+/g,"").replace("(2)","");
            if (t.includes(mn) && (t.includes("가동") || t.length < 15)) { fR = r; break; }
        }
        if (fR !== -1) {
            let cur = {name:stName, ls:null, lue:null, lle:null, rs:null, rue:null, rle:null};
            for (let r=fR; r<fR+40 && r<=rg.e.r; r++) {
                let rawT = getCV(s,r,0)+getCV(s,r,1)+getCV(s,r,2);
                if (rawT.includes("승강장") || rawT.includes("급기") || rawT.includes("배기")) {
                    let v = getCV(s,r,4); let isL = rawT.includes("좌") || rawT.includes("시점") || rawT.includes("시하");
                    if (rawT.includes("급기")) { if(isL) cur.ls=v; else cur.rs=v; }
                    else if (rawT.includes("배기")) { if (rawT.includes("하부")) { if(isL) cur.lle=v; else cur.rle=v; } else { if(isL) cur.lue=v; else cur.rue=v; } }
                }
            }
            const r = [cur.ls, cur.lue, cur.lle, cur.rs, cur.rue, cur.rle];
            const rs = r.map((v, i) => analyzeHVAC(v, stName, (i<3?'supply':'exhaust')));
            d.push({ name:stName, raw:r, res:rs, isCri: rs.some(x=>x.s==='critical') });
        }
    }); return d;
}

function getL2V(s) {
    const d = []; if(!s) return d; const rg = XLSX.utils.decode_range(s['!ref']);
    const allSt = CONFIG.BRANCHES.line2.left.stations.concat(CONFIG.BRANCHES.line2.right.stations);
    allSt.forEach(st => {
        const mn = st.replace(/\s+/g,""); let fR = -1;
        for (let r=0; r<=rg.e.r; r++) { if((getCV(s,r,0)+getCV(s,r,1)).replace(/\s+/g,"").replace("(2)","").includes(mn)) { fR=r; break; } }
        if (fR !== -1) {
            let units = [];
            for (let r=fR; r<fR+40 && r<=rg.e.r; r++) {
                [1, 6, 11].forEach(col => {
                    let name = getCV(s,r,col); if(name.includes("환기실")) {
                        let v = getCV(s,r,col+3); if (CONFIG.NO_EQUIP[st] && CONFIG.NO_EQUIP[st].includes("송풍기")) v = "N/A";
                        units.push({ l: name.replace("환기실","").trim(), v: v, r: analyzeVent(v, (name.includes("우")||name.includes("종점")), st, name) });
                    }
                });
            }
            if (units.length > 0) d.push({ name:st, raw: units.slice(0,4).map(u=>u.v), res: units.slice(0,4).map(u=>u.r), unitNames: units.slice(0,4).map(u=>u.l), isCri: units.some(u=>u.r.s==='critical') });
        }
    }); return d;
}

function getL2C(s) {
    const d = []; if(!s) return d; const rg = XLSX.utils.decode_range(s['!ref']);
    const allSt = CONFIG.BRANCHES.line2.left.stations.concat(CONFIG.BRANCHES.line2.right.stations);
    allSt.forEach(st => {
        if(st === "문양" || (CONFIG.NO_EQUIP[st] && CONFIG.NO_EQUIP[st].includes("냉동기"))) return;
        const mn = st.replace(/\s+/g,""); let tot = 0, found = false;
        for (let r=0; r<=rg.e.r; r++) {
            let txt = (getCV(s,r,0)+getCV(s,r,1)+getCV(s,r,2)).replace(/\s+/g,"").replace("(2)","");
            if (txt.includes(mn)) {
                for(let sub=r; sub<r+40 && sub<=rg.e.r; sub++){
                    let stxt = getCV(s,sub,0)+getCV(s,sub,1)+getCV(s,sub,2);
                    if(stxt.includes("냉동기")) { tot += parseH(getCV(s,sub,4)); found = true; }
                } break;
            }
        }
        if(found){ d.push({name:st, raw:[tot], res:[analyzeChiller(tot, st)], isCri:analyzeChiller(tot, st).s==='critical'}); }
    }); return d;
}

function getAP(s) {
    const d = []; if(!s) return d;
    if (currentLine === 'line1') {
        [{n:"설화명곡",r:179,c:5},{n:"화원",r:179,c:4}].forEach(st => {
            let v = getCV(s,st.r,st.c); if(parseH(v)>0) d.push({name:st.n, units:[{label:"01호기",val:v,res:analyzeHVAC(v,17,st.n,'supply')}]});
        });
        CONFIG.L1_ST_LIST.forEach((n, i) => {
            if(n === "설화명곡" || n === "화원") return;
            let v = getCV(s,75,4+i); if(parseH(v)>0) d.push({name:n, units:[{label:"01호기",val:v,res:analyzeHVAC(v,17,n,'supply')}]});
        });
    } else {
        const rg = XLSX.utils.decode_range(s['!ref']);
        const allSt = CONFIG.BRANCHES.line2.left.stations.concat(CONFIG.BRANCHES.line2.right.stations);
        allSt.forEach(st => {
            if (CONFIG.NO_EQUIP[st] && CONFIG.NO_EQUIP[st].includes("공기청정기")) return;
            let fR = -1; for (let r=0; r<=rg.e.r; r++) { if((getCV(s,r,0)+getCV(s,r,1)).replace(/\s+/g,"").replace("(2)","").includes(st.replace(/\s+/g,""))) { fR=r; break; } }
            if (fR !== -1) { const obj = {name:st, units:[]};
                for (let i=5; i<=35; i++) { [4, 9].forEach(c => {
                    let v = getCV(s,fR+i,c); let uN = getCV(s,fR+i,c-3).replace(/\s+/g,"").replace(/\(.*\)/g,"");
                    if (parseH(v)>0 && v!=='-') { obj.units.push({label:(uN||(i-4))+"호기",val:v,res:analyzeHVAC(v,17,st,'supply')}); }
                }); }
                if (obj.units.length > 0) d.push(obj);
            }
        });
    } return d;
}

function formatToHMS(v) { 
    if(!v||v==='0'||v===0||v==='-'||v==="N/A") return "0:00:00"; 
    let ts; 
    if(typeof v==='number') ts=Math.round(v*3600); 
    else if(typeof v==='string'&&v.includes(':')){ 
        const p=v.split(':'); ts=(parseInt(p[0])||0)*3600+(parseInt(p[1])||0)*60+(parseInt(p[2])||0); 
    } else { 
        const n=parseFloat(v); ts=Math.round(n*3600); 
    } 
    const h=Math.floor(ts/3600), m=Math.floor((ts%3600)/60), s=Math.floor(ts%60); 
    return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`; 
}
