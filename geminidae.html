<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대구교통공사 장비 가동 통합 분석 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --primary: #0052cc;
            --primary-dark: #003a99;
            --primary-light: #e8f0fe;
            --dark: #0f172a;
            --mid: #334155;
            --bg: #f4f6fb;
            --danger: #e11d48;
            --danger-light: #fff1f4;
            --warning: #d97706;
            --warning-light: #fffbeb;
            --success: #059669;
            --success-light: #ecfdf5;
            --border: #dde3ef;
            --na: #94a3b8;
            --sidebar-w: 320px;
            --header-h: 58px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
            --shadow-md: 0 4px 16px rgba(0,52,153,0.08);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.12);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Pretendard', sans-serif;
            background: var(--bg);
            color: var(--dark);
            line-height: 1.6;
            overflow: hidden;
            height: 100vh;
        }

        /* ───── HEADER ───── */
        .app-header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 200;
            height: var(--header-h);
            background: var(--primary-dark);
            display: flex; align-items: center;
            padding: 0 24px; gap: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.18);
        }
        .header-logo {
            display: flex; align-items: center; gap: 10px;
            color: white; font-size: 1rem; font-weight: 900;
            white-space: nowrap;
        }
        .header-pills { flex: 1; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .header-pill {
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
            color: white; padding: 4px 14px; border-radius: 20px;
            font-size: 0.82rem; font-weight: 700; white-space: nowrap;
        }
        .header-btn {
            background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25);
            color: white; padding: 6px 14px; border-radius: 20px;
            font-size: 0.82rem; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .header-btn.upload-btn { background: white; color: var(--primary-dark); border-color: white; }

        .app-shell { display: flex; margin-top: var(--header-h); height: calc(100vh - var(--header-h)); }

        /* ───── SIDEBAR ───── */
        .sidebar {
            width: var(--sidebar-w); min-width: var(--sidebar-w);
            background: white; border-right: 1px solid var(--border);
            overflow-y: auto; display: flex; flex-direction: column;
        }
        .sidebar-header {
            padding: 16px 18px 12px; border-bottom: 1px solid var(--border);
            background: white; position: sticky; top: 0; z-index: 10;
        }
        .sidebar-title { font-size: 0.78rem; font-weight: 800; color: var(--na); text-transform: uppercase; }
        .sidebar-branch-name { font-size: 1rem; font-weight: 900; color: var(--dark); margin-top: 2px; }
        .progress-bar-wrap { margin-top: 10px; background: #f1f5f9; border-radius: 99px; height: 6px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #60a5fa); transition: width 0.4s ease; }
        
        .sidebar-group { padding: 12px 14px 4px; }
        .sidebar-group-title { font-size: 0.72rem; font-weight: 800; color: var(--na); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .sidebar-group-title::before { content: ''; width: 3px; height: 11px; background: var(--primary); border-radius: 2px; }
        
        .checklist-item {
            display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 10px;
            border: 1.5px solid #fbd0d9; background: #fff8f9; margin-bottom: 5px; cursor: pointer; transition: 0.2s;
        }
        .checklist-item.done { border-color: #d1fae5; background: #f0fdf4; opacity: 0.6; }
        .checklist-check { width: 18px; height: 18px; border-radius: 5px; border: 2px solid #fbb6c4; background: white; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; }
        .checklist-item.done .checklist-check { background: var(--success); border-color: var(--success); color: white; }
        .checklist-label { font-size: 0.8rem; font-weight: 800; color: var(--danger); flex: 1; }
        .checklist-item.done .checklist-label { color: var(--success); text-decoration: line-through; }
        .checklist-val { font-size: 0.72rem; font-weight: 700; background: #fce7ec; padding: 2px 7px; border-radius: 6px; }

        /* ───── MAIN CONTENT ───── */
        .main-content { flex: 1; overflow-y: auto; padding: 24px 28px 48px; }

        /* ───── UPLOAD & MODAL ───── */
        .upload-screen { display: flex; align-items: center; justify-content: center; height: 100%; }
        .upload-card { background: white; border-radius: 24px; padding: 60px; box-shadow: var(--shadow-md); border: 2px dashed #c5d3e8; text-align: center; cursor: pointer; max-width: 500px; width: 100%; }
        
        .modal-overlay { position: fixed; inset: 0; z-index: 500; background: rgba(10, 20, 50, 0.6); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: white; border-radius: 24px; padding: 36px; width: 480px; box-shadow: var(--shadow-lg); }
        .modal-choices { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 25px; }
        .modal-choice { border: 2px solid var(--border); border-radius: 16px; padding: 20px; cursor: pointer; text-align: center; transition: 0.2s; }
        .modal-choice:hover { border-color: var(--primary); background: var(--primary-light); transform: translateY(-2px); }

        /* ───── [중요] 요약 그리드 레이아웃 ───── */
        .summary-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            margin-bottom: 30px; 
        }
        .alert-card { background: white; border-radius: 20px; padding: 22px; border-left: 8px solid var(--danger); box-shadow: var(--shadow-sm); border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .alert-card.ok { border-left-color: var(--success); }
        .alert-card.full-width { grid-column: 1 / -1; }
        .alert-title { font-weight: 900; font-size: 1rem; margin-bottom: 12px; color: var(--dark); display: flex; justify-content: space-between; align-items: center; }
        
        .badge-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .badge-item { 
            background: #fff1f2; color: var(--danger); padding: 8px 12px; border-radius: 8px; font-size: 0.8rem; 
            font-weight: 800; display: flex; justify-content: space-between; align-items: center;
            border: 1px solid #ffe4e6; transition: 0.2s; cursor: pointer;
        }
        .badge-item:hover { background: #ffe4e6; }
        .badge-item.checked { opacity: 0.4; text-decoration: line-through; background: #f1f5f9; color: var(--na); border-color: var(--border); }
        .val-tag { background: white; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-family: monospace; }

        /* 상세 테이블 */
        .branch-tabs { display: flex; gap: 6px; margin-bottom: 20px; background: #eaeff7; padding: 4px; border-radius: 12px; width: fit-content; }
        .branch-tab { padding: 8px 20px; border-radius: 9px; border: none; font-size: 0.85rem; font-weight: 800; cursor: pointer; color: var(--text-sub); transition: 0.2s; }
        .branch-tab.active { background: white; color: var(--primary); box-shadow: var(--shadow-sm); }

        .section-card { background: white; border-radius: 18px; margin-bottom: 15px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); overflow: hidden; }
        .section-trigger { width: 100%; padding: 16px 24px; display: flex; justify-content: space-between; background: white; border: none; cursor: pointer; font-weight: 800; font-size: 1rem; }
        .section-content { display: none; padding: 0 20px 20px; }
        .section-content.active { display: block; }

        table { width: 100%; border-collapse: collapse; border-radius: 10px; overflow: hidden; font-size: 0.9rem; }
        th { background: #f1f5f9; padding: 12px; font-size: 0.75rem; color: var(--text-sub); }
        td { padding: 12px 8px; border-bottom: 1px solid #f1f5f9; text-align: center; font-weight: 600; }
        .st-name-col { background: #f8faff; font-weight: 800; color: var(--primary); width: 100px; border-right: 1px solid #f1f5f9; text-align: left; padding-left: 15px; }
        .row-critical { background: #fff1f2 !important; color: var(--danger); }
    </style>
</head>
<body>

<header class="app-header">
    <div class="header-logo">🚇 장비 가동 통합 관제</div>
    <div class="header-pills" id="header-pills"></div>
    <div class="header-actions">
        <button class="header-btn upload-btn" onclick="document.getElementById('excelFile').click()">📂 파일 업로드</button>
        <input type="file" id="excelFile" hidden />
        <button class="header-btn" onclick="location.reload()">↺ 초기화</button>
    </div>
</header>

<div class="modal-overlay" id="branchModal">
    <div class="modal-box">
        <h2 id="modal-line-title" style="font-weight:900; margin-bottom:10px;">분소 선택</h2>
        <p style="color:var(--na); font-weight:600; font-size:0.9rem;">상세 분석을 진행할 분소를 선택해 주세요.</p>
        <div class="modal-choices" id="modal-choices-area"></div>
        <button style="width:100%; margin-top:15px; padding:12px; border-radius:12px; border:1.5px dashed var(--border); background:white; font-weight:800; cursor:pointer;" onclick="selectBranch('both')">⇄ 두 분소 모두 보기</button>
    </div>
</div>

<div class="app-shell">
    <aside class="sidebar" id="sidebar">
        <div style="padding:40px 20px; text-align:center; color:var(--na); font-weight:700;">파일을 업로드하면<br>목표 리스트가 생성됩니다.</div>
    </aside>

    <main class="main-content" id="main-content">
        <div class="upload-screen">
            <div class="upload-card" onclick="document.getElementById('excelFile').click()">
                <div style="font-size:4rem; margin-bottom:20px;">📊</div>
                <h2 style="font-weight:900; color:var(--primary); margin-bottom:10px;">가동일보 데이터 분석</h2>
                <p style="color:var(--na); font-weight:600;">DRIMS 가동일보 엑셀 파일을 선택하세요.</p>
            </div>
        </div>
    </main>
</div>

<script>
/**
 * [환경 설정 및 로직] - 기존 로직 100% 유지
 */
const CONFIG = {
    VENT_SEASON: { INTER: [3, 4, 5, 10], SUMMER: [6, 7, 8, 9], WINTER: [11, 12, 1, 2] },
    NO_EQUIP: { "문양": ["공조기", "송풍기", "냉동기", "공기청정기"], "다사": ["상부배기", "하부배기"], "대실": ["상부배기", "하부배기"] },
    ST_NOR_TYPE: { "명덕": 1, "청라언덕": 1, "반월당": 1, "현충로": 2, "중앙로": 2, "안심": 2, "다사": 2, "두류": 2, "담티": 2, "영남대": 2, "영대": 2, "반월당(1호선)": 3 },
    ST_COOL_TYPE: { "화원": 1, "반야월": 1, "각산": 1, "대곡": 2, "월촌": 2, "송현": 2, "교대": 2, "명덕": 2, "동구청": 2, "방촌": 2, "용계": 2, "율하": 2, "신기": 2 },
    CHILLER_VALS: {
        "설화명곡":6.0,"화원":6.0,"대곡":6.0,"진천":5.5,"월배":5.5,"상인":11.5,"월촌":5.5,"송현":5.5,"서부정류장":10.0,"대명":5.5,"안지랑":5.5,"현충로":5.5,"영대병원":6.0,"교대":7.0,"명덕":6.0,"반월당":11.5,"중앙로":14.5,"대구역":6.0,"칠성시장":5.5,"신천":5.5,"동대구":11.5,"동구청":5.5,"아양교":6.0,"동촌":5.5,"해안":5.5,"방촌":6.0,"용계":5.5,"율하":6.0,"신기":5.5,"반야월":5.5,"각산":6.0,"안심":11.5,
        "문양":7.0,"다사":4.0,"대실":4.5,"강창":4.5,"계명대":4.5,"성서산단":4.5,"성서산업단지":4.5,"이곡":4.5,"용산":6.0,"죽전":6.0,"감삼":6.0,"두류":6.0,"내당":6.5,"반고개":6.0,"청라언덕":6.5,"반월당(2호선)":12.0,"경대병원":6.0,"대구은행":6.0,"범어":5.5,"수성구청":5.0,"만촌":4.5,"담티":5.0,"연호":5.0,"수성알파":5.0,"수성알파시티":5.0,"고산":6.5,"신매":5.5,"사월":6.0,"정평":5.5,"임당":4.5,"영남대":4.5,"영대":4.5
    },
    BRANCHES: {
        line1: {
            left: { name: "송현기계분소", stations: ["설화명곡", "화원", "대곡", "진천", "월배", "상인", "월촌", "송현", "서부정류장", "대명", "안지랑", "현충로", "영대병원", "교대", "명덕", "반월당", "중앙로"] },
            right: { name: "동대구기계분소", stations: ["대구역", "칠성시장", "신천", "동대구", "동구청", "아양교", "동촌", "해안", "방촌", "용계", "율하", "신기", "반야월", "각산", "안심"] }
        },
        line2: {
            left: { name: "문양기지기계분소", stations: ["문양", "다사", "대실", "강창", "계명대", "성서산단", "성서산업단지", "이곡", "용산", "죽전", "감삼", "두류", "내당", "반고개", "청라언덕"] },
            right: { name: "사월기계분소", stations: ["반월당", "경대병원", "대구은행", "범어", "수성구청", "만촌", "담티", "연호", "수성알파", "수성알파시티", "대공원", "고산", "신매", "사월", "정평", "임당", "영남대", "영대"] }
        }
    },
    L1_ST_LIST: ["대곡","진천","월배","상인","월촌","송현","서부정류장","대명","안지랑","현충로","영대병원","교대","명덕","반월당","중앙로","대구역","칠성시장","신천","동대구","동구청","아양교","동촌","해안","방촌","용계","율하","신기","반야월","각산","안심"]
};

let isCooling = false, currentLine = '', ventSeason = '', globalData = null, selectedBranch = 'both';
let doneCount = 0, totalItems = 0;

function parseH(v) { 
    if(!v || v==="" || v==="-" || v==="N/A") return 0;
    if(typeof v === 'number') return v * 24;
    let s = String(v).trim();
    if(s.includes(':')) {
        let p = s.split(':'); return (parseInt(p[0])||0) + (parseInt(p[1])||0)/60 + (parseInt(p[2])||0)/3600;
    }
    return parseFloat(s) || 0;
}
function formatToHMS(v) {
    if(!v || v==="-" || v==="N/A") return "-";
    let h = (typeof v === 'number') ? v : parseH(v);
    let ts = Math.round(h * 3600);
    return `${Math.floor(ts/3600)}:${String(Math.floor((ts%3600)/60)).padStart(2,'0')}:${String(ts%60).padStart(2,'0')}`;
}
function getCV(s, r, c) { let cell = s[XLSX.utils.encode_cell({r,c})]; return cell ? (cell.w || String(cell.v || "")) : ""; }

/**
 * [판정 로직]
 */
function analyzeHVAC(val, st, type) {
    if (CONFIG.NO_EQUIP[st] && (CONFIG.NO_EQUIP[st].includes("공조기") || CONFIG.NO_EQUIP[st].includes(type))) return { s: 'none', c: 'na-text' };
    const h = (typeof val === 'number') ? val : parseH(val);
    if (!isCooling) {
        const cleanSt = st.replace(/\s+/g,"");
        const sk = (cleanSt === "반월당" && currentLine === 'line1') ? "반월당(1호선)" : cleanSt;
        const tNum = CONFIG.ST_NOR_TYPE[sk] || 4;
        const target = (tNum === 1) ? 17 : (tNum === 2 ? 15 : (tNum === 3 ? 15.5 : 16.5));
        if (type === 'supply') {
            if (Math.abs(h - target) >= 5) return { s: 'critical', c: 'row-critical' };
            return (h >= 15 && h <= 18) ? { s: 'ok', c: '' } : { s: 'warning', c: '' };
        } else {
            return h <= (10/60) ? { s: 'critical', c: 'row-critical' } : (h <= 0.5 ? { s: 'warning', c: '' } : { s: 'ok', c: '' });
        }
    } else {
        const cleanSt = st.replace(/\s+/g,"");
        const tNum = CONFIG.ST_COOL_TYPE[cleanSt] || 3;
        const chKey = (cleanSt === "반월당" && currentLine === 'line2') ? "반월당(2호선)" : cleanSt;
        const chTg = CONFIG.CHILLER_VALS[chKey] || 9.0;
        if (type === 'supply') {
            if (tNum === 1) {
                if (Math.abs(h - 12) >= 4) return { s: 'critical', c: 'row-critical' };
                return (h >= 10 && h <= 13) ? { s: 'ok', c: '' } : { s: 'warning', c: '' };
            } else if (tNum === 2) {
                return (h >= 7.5 && h <= 10.5) ? { s: 'ok', c: '' } : { s: 'warning', c: '' };
            } else {
                return (Math.abs(h - chTg) > 2) ? { s: 'critical', c: 'row-critical' } : { s: 'ok', c: '' };
            }
        } else {
            if (h < 0.5 || h >= 4) return { s: 'critical', c: 'row-critical' };
            return (h >= 0.5 && h <= 3.5) ? { s: 'ok', c: '' } : { s: 'warning', c: '' };
        }
    }
}
function analyzeVent(val, isR, st) {
    if (CONFIG.NO_EQUIP[st] && CONFIG.NO_EQUIP[st].includes("송풍기")) return { s: 'none', c: 'na-text' };
    const h = (typeof val === 'number') ? val : parseH(val);
    const cSt = st.replace(/\s+/g,"").replace("(2)","");
    if (cSt === "대실" || cSt === "범어") {
        const limit = (ventSeason === '하절기') ? 20 : 5;
        return (h >= limit) ? { s: 'critical', c: 'row-critical' } : { s: 'ok', c: '' };
    }
    let target = (ventSeason === '간절기') ? 3 : (ventSeason === '하절기' ? (isR ? 10.8 : 9.8) : 2);
    if (currentLine === 'line1') {
        if (cSt === "중앙로" && isR) target = 19;
        if (cSt === "칠성시장" && !isR) target = 19;
        if (cSt === "방촌" && !isR) target = 19;
        if (cSt === "송현" && isR) target = 19;
    } else if (currentLine === 'line2') {
        if (cSt === "반월당") target = 19;
        if (cSt === "수성알파" && isR) target = 19;
        if (cSt === "수성구청" && isR) target = 19;
        if (cSt === "연호" && isR) target = 19;
    }
    if (ventSeason === '하절기') {
        if (["명덕","연호","임당","영남대"].some(s => cSt.includes(s)) && isR) target = 17.8;
        if (cSt === "고산" && isR) target = 6.5;
        if (cSt === "신매" && !isR) target = 5.5;
        if (cSt === "정평" && isR) target = 5.5;
        if (cSt === "이곡") target = 4.5;
    }
    if (h === 0 || Math.abs(h - target) >= 2) return { s: 'critical', c: 'row-critical' };
    if (Math.abs(h - target) <= 1.5) return { s: 'ok', c: '' };
    return { s: 'warning', c: '' };
}
function analyzeAir(val) {
    const h = parseH(val);
    if (h === 0) return { s: 'none', c: '' };
    if (Math.abs(h - 17) >= 5) return { s: 'critical', c: 'row-critical' };
    return (h >= 15 && h <= 18) ? { s: 'ok', c: '' } : { s: 'warning', c: '' };
}

/**
 * [추출 모듈]
 */
const Extractor = {
    getLine1(s) {
        const res = { hvac: [], vent: [], chiller: [], air: [] };
        const allSt = CONFIG.BRANCHES.line1.left.stations.concat(CONFIG.BRANCHES.line1.right.stations);
        allSt.forEach((st) => {
            let c, hR, vR, cV, aV;
            if (st === "설화명곡") {
                c = 5; hR = [getCV(s,81,c),getCV(s,82,c),getCV(s,89,c),getCV(s,90,c)];
                vR = [getCV(s,97,c),getCV(s,98,c),getCV(s,99,c),getCV(s,100,c)];
                cV = parseH(getCV(s,155,c)) + parseH(getCV(s,156,c)); aV = getCV(s,179,c);
            } else if (st === "화원") {
                c = 4; hR = [getCV(s,81,c),getCV(s,82,c),getCV(s,89,c),getCV(s,90,c)];
                vR = [getCV(s,97,c),getCV(s,98,c),getCV(s,99,c),getCV(s,100,c)];
                cV = parseH(getCV(s,155,c)) + parseH(getCV(s,156,c)); aV = getCV(s,179,c);
            } else {
                c = CONFIG.L1_ST_LIST.indexOf(st) + 4;
                hR = [getCV(s,5,c),getCV(s,6,c),getCV(s,13,c),getCV(s,14,c)];
                vR = [getCV(s,19,c),getCV(s,20,c),getCV(s,21,c),getCV(s,22,c)];
                cV = parseH(getCV(s,56,c)); aV = getCV(s,75,c);
            }
            res.hvac.push({ name: st, raw: hR, res: hR.map((v,i) => analyzeHVAC(v,st,i%2===0?'supply':'exhaust')), isCri: false });
            res.hvac[res.hvac.length-1].isCri = res.hvac[res.hvac.length-1].res.some(r => r.s==='critical');
            res.vent.push({ name: st, raw: vR, res: vR.map((v,i) => analyzeVent(v,i>=2,st)), isCri: false });
            res.vent[res.vent.length-1].isCri = res.vent[res.vent.length-1].res.some(r => r.s==='critical');
            if (isCooling) res.chiller.push({ name: st, raw: [cV], res: [{s:(cV===0||Math.abs(cV-(CONFIG.CHILLER_VALS[st]||6.0))>=3?'critical':'ok'),c:(cV===0||Math.abs(cV-(CONFIG.CHILLER_VALS[st]||6.0))>=3?'row-critical':'')}], isCri: (cV===0||Math.abs(cV-(CONFIG.CHILLER_VALS[st]||6.0))>=3) });
            if (parseH(aV) > 0) res.air.push({ name: st, units: [{label:"01호기",val:aV,res:analyzeAir(aV)}], isCri: analyzeAir(aV).s==='critical' });
        }); return res;
    },
    getLine2(s, apSheet) {
        const res = { hvac: [], vent: [], chiller: [], air: [] };
        const allSt = CONFIG.BRANCHES.line2.left.stations.concat(CONFIG.BRANCHES.line2.right.stations);
        const rg = XLSX.utils.decode_range(s['!ref']);
        allSt.forEach(stName => {
            if (stName === "문양") {
                res.hvac.push({ name:"문양", raw:["-","-","-","-"], res:Array(4).fill({s:'none',c:'na-text'}), isCri:false });
                res.vent.push({ name:"문양", raw:["-","-","-","-"], res:Array(4).fill({s:'none',c:'na-text'}), unitNames:["-","-","-","-"], isCri:false });
            }
            const mn = stName.replace(/\s+/g,""); let fR = -1;
            for (let r = 0; r <= rg.e.r; r++) { if ((getCV(s,r,0)+getCV(s,r,1)).replace(/\s+/g,"").includes(mn)) { fR=r; break; } }
            if (fR !== -1) {
                if (stName !== "문양") {
                    const isSp = ["정평","임당","영대","영남대"].some(sp => stName.includes(sp));
                    let hL=getCV(s,fR+5,4), hLe=getCV(s,fR+6,4), hR=getCV(s,fR+(isSp?9:8),4), hRe=getCV(s,fR+(isSp?10:9),4);
                    res.hvac.push({ name:stName, raw:[hL,hLe,hR,hRe], res:[analyzeHVAC(hL,stName,'supply'),analyzeHVAC(hLe,stName,'exhaust'),analyzeHVAC(hR,stName,'supply'),analyzeHVAC(hRe,stName,'exhaust')], isCri:false });
                    res.hvac[res.hvac.length-1].isCri = res.hvac[res.hvac.length-1].res.some(r=>r.s==='critical');
                }
                let unitsV=[], chSum=0, chFound=false;
                if (stName==="문양") { chSum=parseH(getCV(s,5,4)); chFound=true; }
                const isBWD = stName==="반월당";
                const vNameCol=isBWD?16:11, vValCol=isBWD?19:14;
                for (let r=fR; r<fR+55&&r<=rg.e.r; r++) {
                    if (stName!=="문양") {
                        let vName=getCV(s,r,vNameCol).replace(/\s+/g,""); let vVal=getCV(s,r,vValCol);
                        if (vName.includes("환기실")) unitsV.push({l:vName.replace("환기실","").trim(),v:vVal,r:analyzeVent(vVal,(vName.includes("우")||vName.includes("종점")),stName)});
                    }
                    if (getCV(s,r,0).includes("냉동기")&&stName!=="문양") { chSum+=parseH(getCV(s,r,4)); chFound=true; }
                }
                if (stName!=="문양"&&unitsV.length>0) res.vent.push({name:stName,raw:unitsV.slice(0,4).map(u=>u.v),res:unitsV.slice(0,4).map(u=>u.r),unitNames:unitsV.slice(0,4).map(u=>u.l),isCri:unitsV.some(u=>u.r.s==='critical')});
                if (chFound&&isCooling) {
                    const sk=(stName==="반월당")?"반월당(2호선)":stName;
                    const isC=(chSum===0||Math.abs(chSum-(CONFIG.CHILLER_VALS[sk]||6.0))>=3);
                    res.chiller.push({name:stName,raw:[chSum],res:[{s:isC?'critical':'ok',c:isC?'row-critical':''}],isCri:isC});
                }
                if (apSheet) {
                    let rawUnits=[]; let apR=-1; const apRg=XLSX.utils.decode_range(apSheet['!ref']);
                    for(let r=0;r<=apRg.e.r;r++){if(getCV(apSheet,r,0).replace(/\s+/g,"").includes(mn)){apR=r;break;}}
                    if (apR !== -1) {
                        for(let r=apR;r<apR+50&&r<=apRg.e.r;r++){
                            const nL=getCV(apSheet,r,1),vL=getCV(apSheet,r,4),nR=getCV(apSheet,r,6),vR=getCV(apSheet,r,9);
                            if(nL&&nL!=="장비명"&&!nL.includes("스마트")&&vL!==""){rawUnits.push({label:nL.trim().substring(0,2)+"호기",val:vL,res:analyzeAir(vL)});}
                            if(nR&&nR!=="장비명"&&!nR.includes("스마트")&&vR!==""){rawUnits.push({label:nR.trim().substring(0,2)+"호기",val:vR,res:analyzeAir(vR)});}
                            if(r>apR+5&&!nL&&!nR)break;
                        }
                        rawUnits.sort((a,b)=>a.label.localeCompare(b.label,undefined,{numeric:true}));
                    }
                    if (rawUnits.length>0) res.air.push({name:stName,units:rawUnits,isCri:rawUnits.some(a=>a.res.s==='critical')});
                }
            }
        }); return res;
    }
};

/**
 * [UX 핸들러]
 */
document.getElementById('excelFile').addEventListener('change', function(e) {
    const file = e.target.files[0]; if (!file) return;
    currentLine = file.name.includes("일보") ? 'line2' : 'line1';
    const reader = new FileReader();
    reader.onload = (evt) => {
        try {
            const wb = XLSX.read(evt.target.result, { type: 'binary', cellDates: false });
            const dm = file.name.match(/\d{8}/);
            let m = dm ? parseInt(dm[0].substring(4,6)) : 1, d = dm ? parseInt(dm[0].substring(6,8)) : 1;
            isCooling = (m===7 || m===8 || (m===9 && d<=20));
            ventSeason = CONFIG.VENT_SEASON.INTER.includes(m) ? '간절기' : (CONFIG.VENT_SEASON.SUMMER.includes(m) ? '하절기' : '동절기');

            document.getElementById('header-pills').innerHTML = `
                <div class="header-pill">📅 ${m}월 ${d}일</div>
                <div class="header-pill">${isCooling ? '❄️ 냉방' : '☀️ 비냉방'}</div>
                <div class="header-pill">${currentLine === 'line1' ? '🔴 1호선' : '🟢 2호선'}</div>
            `;

            const findS = (names) => {
                for (let n of names) { let sheet = wb.SheetNames.find(sn => sn.replace(/\s+/g,"")===n); if (sheet) return wb.Sheets[sheet]; }
                return null;
            };
            
            globalData = (currentLine === 'line1') 
                ? Extractor.getLine1(findS(["가동시간"]) || wb.Sheets[wb.SheetNames[0]])
                : Extractor.getLine2(findS(["장비"]), findS(["공기청정기"]));

            openModal();
        } catch(err) { alert("분석 실패"); console.error(err); }
    };
    reader.readAsBinaryString(file);
});

function openModal() {
    const modal = document.getElementById('branchModal');
    const title = document.getElementById('modal-line-title');
    const area = document.getElementById('modal-choices-area');
    const br = CONFIG.BRANCHES[currentLine];
    
    title.innerText = (currentLine === 'line1' ? '🔴 1호선' : '🟢 2호선') + ' 분소 선택';
    area.innerHTML = `
        <div class="modal-choice" onclick="selectBranch('left')">
            <div style="font-size:2rem; margin-bottom:10px;">🏭</div>
            <div style="font-weight:900;">${br.left.name}</div>
        </div>
        <div class="modal-choice" onclick="selectBranch('right')">
            <div style="font-size:2rem; margin-bottom:10px;">🏗️</div>
            <div style="font-weight:900;">${br.right.name}</div>
        </div>
    `;
    modal.classList.add('active');
}

function selectBranch(side) {
    selectedBranch = side;
    document.getElementById('branchModal').classList.remove('active');
    document.getElementById('upload-screen')?.remove(); 
    renderDashboard();
}

function renderDashboard() {
    const br = CONFIG.BRANCHES[currentLine];
    let branches = (selectedBranch === 'both') ? [br.left, br.right] : [br[selectedBranch]];

    // 사이드바 체크리스트 렌더
    renderSidebar(branches);

    // 메인 콘텐츠 렌더
    let mainHtml = '';
    if (selectedBranch === 'both') {
        mainHtml += `
        <div class="branch-tabs">
            <button class="branch-tab active" id="tab-l" onclick="switchTab('l')">${br.left.name}</button>
            <button class="branch-tab" id="tab-r" onclick="switchTab('r')">${br.right.name}</button>
        </div>`;
    }

    branches.forEach((branch, idx) => {
        const panelId = `panel-${(selectedBranch === 'both' && idx === 1) ? 'r' : 'l'}`;
        const isHidden = (selectedBranch === 'both' && idx === 1) ? 'display:none' : '';
        mainHtml += `<div id="${panelId}" style="${isHidden}">`;
        mainHtml += renderBranchUI(branch);
        mainHtml += `</div>`;
    });

    document.getElementById('main-content').innerHTML = mainHtml;
}

function renderBranchUI(branch) {
    const data = globalData;
    const cH = data.hvac.filter(d => branch.stations.includes(d.name) && d.isCri);
    const cV = data.vent.filter(d => branch.stations.includes(d.name) && d.isCri);
    const cC = data.chiller.filter(d => branch.stations.includes(d.name) && d.isCri);
    const cA = data.air.filter(d => branch.stations.includes(d.name) && d.isCri);
    const isAllOk = (cH.length + cV.length + cC.length + cA.length === 0);

    // [핵심] 요약 영역 2열 배치 레이아웃
    let summaryHtml = '<div class="summary-grid">';
    const buildAlert = (title, items, type, fullWidth = false) => {
        const cls = fullWidth ? 'full-width' : '';
        if (items.length === 0) return `<div class="alert-card ok ${cls}"><div class="alert-title">${title} ✅</div><p style="color:var(--success); font-size:0.85rem; font-weight:700;">이상 항목 없음</p></div>`;
        let h = `<div class="alert-card ${cls}"><div class="alert-title">${title} ⚠️</div><div class="badge-list">`;
        items.forEach(d => {
            if (type === 'air') {
                d.units.forEach(u => { if(u.res.s==='critical') h += `<div class="badge-item" onclick="this.classList.toggle('checked')"><span>${d.name} ${u.label}</span><span class="val-tag">${formatToHMS(u.val)}</span></div>`; });
            } else {
                d.res.forEach((r, i) => { if (r.s === 'critical') {
                    const lbl = (type==='vent'&&currentLine==='line2'?(d.unitNames?d.unitNames[i]:["시급","시배","종급","종배"][i]):(type==='chiller'?"냉동기":["시급","시배","종급","종배"][i]));
                    h += `<div class="badge-item" onclick="this.classList.toggle('checked')"><span>${d.name} ${lbl}</span><span class="val-tag">${formatToHMS(d.raw[i])}</span></div>`;
                } });
            }
        });
        return h + `</div></div>`;
    };

    if (isAllOk) {
        summaryHtml += `<div class="alert-card ok full-width" style="text-align:center; padding:40px;"><h2 style="color:var(--success)">✅ 모든 장비가 정상 가동 중입니다.</h2></div>`;
    } else {
        if (isCooling) {
            // 냉방 시즌: 공조/송풍 (1행), 냉동/청정 (2행)
            summaryHtml += buildAlert('승강장공조기', cH, 'hvac');
            summaryHtml += buildAlert('환기실송풍기', cV, 'vent');
            summaryHtml += buildAlert('냉동기', cC, 'chiller');
            summaryHtml += buildAlert('공기청정기', cA, 'air');
        } else {
            // 비냉방 시즌: 공조/송풍 (1행), 청정기 (2행 전체)
            summaryHtml += buildAlert('승강장공조기', cH, 'hvac');
            summaryHtml += buildAlert('환기실송풍기', cV, 'vent');
            summaryHtml += buildAlert('공기청정기', cA, 'air', true);
        }
    }
    summaryHtml += '</div>';

    // 상세 테이블 섹션
    const sH = data.hvac.filter(d => branch.stations.includes(d.name)), sV = data.vent.filter(d => branch.stations.includes(d.name)), sC = data.chiller.filter(d => branch.stations.includes(d.name)), sA = data.air.filter(d => branch.stations.includes(d.name));
    const buildT = (items, labels) => {
        let h = `<table><thead><tr><th>역사</th>${labels.map(l=>`<th>${l}</th>`).join('')}<th>판정</th></tr></thead><tbody>`;
        items.forEach(d => {
            const isEx = d.res.length > 0 && d.res[0].s === 'none';
            h += `<tr class="${d.isCri?'row-critical':''}">`;
            h += `<td class="st-name-col">${d.name}</td>`;
            for (let i=0; i<labels.length; i++) h += `<td>${isEx?"-":formatToHMS(d.raw[i])}</td>`;
            h += `<td style="font-weight:900">${isEx?'장비 없음':(d.isCri?'이상':'정상')}</td></tr>`;
        }); return h + `</tbody></table>`;
    };
    const buildAT = (items) => {
        let h = `<table><thead><tr><th>역사</th><th>장비명</th><th>가동시간</th><th>판정</th></tr></thead><tbody>`;
        items.forEach(d => { d.units.forEach((u, idx) => {
            h += `<tr class="${u.res.s==='critical'?'row-critical':''}">`;
            if (idx === 0) h += `<td class="st-name-col" rowspan="${d.units.length}">${d.name}</td>`;
            h += `<td style="color:var(--text-sub)">${u.label}</td><td>${formatToHMS(u.val)}</td><td style="font-weight:900">${u.res.s==='critical'?'이상':'정상'}</td></tr>`;
        }); }); return h + `</tbody></table>`;
    };

    let detailHtml = `
        <div class="section-card">
            <button class="section-trigger" onclick="toggleAcc(this)">⚙️ 승강장공조기 상세 내역 <span>▾</span></button>
            <div class="section-content ${cH.length>0?'active':''}">${buildT(sH, ["시급","시배","종급","종배"])}</div>
        </div>
        <div class="section-card">
            <button class="section-trigger" onclick="toggleAcc(this)">🌪️ 환기실송풍기 상세 내역 <span>▾</span></button>
            <div class="section-content ${cV.length>0?'active':''}">${buildT(sV, ["시급","시배","종급","종배"])}</div>
        </div>
        ${isCooling?`<div class="section-card"><button class="section-trigger" onclick="toggleAcc(this)">❄️ 냉동기 상세 내역 <span>▾</span></button><div class="section-content ${cC.length>0?'active':''}">${buildT(sC, ["가동시간"])}</div></div>`:''}
        <div class="section-card">
            <button class="section-trigger" onclick="toggleAcc(this)">🌬️ 공기청정기 상세 내역 <span>▾</span></button>
            <div class="section-content ${cA.length>0?'active':''}">${buildAT(sA)}</div>
        </div>
    `;

    return summaryHtml + detailHtml;
}

function renderSidebar(branches) {
    const data = globalData;
    let itemsHtml = ''; totalItems = 0; doneCount = 0;
    
    branches.forEach(br => {
        const cH = data.hvac.filter(d => br.stations.includes(d.name) && d.isCri);
        const cV = data.vent.filter(d => br.stations.includes(d.name) && d.isCri);
        const cC = data.chiller.filter(d => br.stations.includes(d.name) && d.isCri);
        const cA = data.air.filter(d => br.stations.includes(d.name) && d.isCri);
        
        if (branches.length > 1) itemsHtml += `<div style="padding:12px 18px 5px; font-weight:900; color:var(--primary); font-size:0.8rem;">📍 ${br.name}</div>`;

        const makeGroup = (title, items, type) => {
            if (items.length === 0) return '';
            let h = `<div class="sidebar-group"><div class="sidebar-group-title">${title}</div>`;
            items.forEach(d => {
                if (type === 'air') {
                    d.units.forEach(u => { if(u.res.s==='critical') { totalItems++; h += `<div class="checklist-item" onclick="checkItem(this)"><div class="checklist-check"></div><div class="checklist-label">${d.name} ${u.label}</div><div class="checklist-val">${formatToHMS(u.val)}</div></div>`; }});
                } else {
                    d.res.forEach((r, i) => { if (r.s === 'critical') {
                        totalItems++;
                        const lbl = (type==='vent'&&currentLine==='line2'?(d.unitNames?d.unitNames[i]:["시급","시배","종급","종배"][i]):(type==='chiller'?"냉동기":["시급","시배","종급","종배"][i]));
                        h += `<div class="checklist-item" onclick="checkItem(this)"><div class="checklist-check"></div><div class="checklist-label">${d.name} ${lbl}</div><div class="checklist-val">${formatToHMS(d.raw[i])}</div></div>`;
                    }});
                }
            });
            return h + `</div>`;
        };
        itemsHtml += makeGroup('⚙️ 공조기', cH, 'hvac') + makeGroup('🌪️ 송풍기', cV, 'vent') + makeGroup('❄️ 냉동기', cC, 'chiller') + makeGroup('🌬️ 청정기', cA, 'air');
    });

    document.getElementById('sidebar').innerHTML = `
        <div class="sidebar-header">
            <div class="sidebar-title">확인 필요 리스트</div>
            <div class="sidebar-branch-name">${branches.map(b=>b.name).join(' / ')}</div>
            <div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div>
        </div>
        ${totalItems === 0 ? '<div style="padding:40px 20px; text-align:center; color:var(--success); font-weight:800;">✅ 모든 장비 정상</div>' : itemsHtml}
    `;
    updateProg();
}

function checkItem(el) {
    el.classList.toggle('done');
    doneCount = document.querySelectorAll('.checklist-item.done').length;
    updateProg();
}
function updateProg() {
    const pct = totalItems === 0 ? 100 : (doneCount / totalItems * 100);
    document.getElementById('prog-fill').style.width = pct + '%';
}
function toggleAcc(btn) {
    btn.classList.toggle('active');
    btn.nextElementSibling.classList.toggle('active');
}
function switchTab(s) {
    const isL = s === 'l';
    document.getElementById('tab-l').classList.toggle('active', isL);
    document.getElementById('tab-r').classList.toggle('active', !isL);
    document.getElementById('panel-l').style.display = isL ? '' : 'none';
    document.getElementById('panel-r').style.display = isL ? 'none' : '';
}
</script>
