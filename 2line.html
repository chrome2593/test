<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2호선 가동일보 통합 분석</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --primary: #009223; --dark: #1e293b; --bg-light: #f8fafc; --danger: #e11d48; --border: #cbd5e0; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: var(--bg-light); color: var(--dark); }
        .container { max-width: 1600px; margin: 0 auto; padding: 0 20px; }
        
        .app-header { background: white; border-bottom: 4px solid var(--primary); padding: 15px 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .header-inner { display: flex; justify-content: space-between; align-items: center; }
        
        .upload-box { background: white; padding: 30px; border: 3px dashed var(--primary); border-radius: 16px; text-align: center; cursor: pointer; margin-top: 20px; transition: 0.2s; }
        .upload-box.minimized { padding: 10px; border-style: solid; border-width: 1px; display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 20px; }

        .branch-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .branch-title { background: var(--dark); color: white; padding: 12px 15px; border-radius: 8px; font-weight: 800; margin-bottom: 15px; }

        .table-wrapper { background: white; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #f8fafc; padding: 12px; font-size: 0.85rem; border-bottom: 2px solid var(--border); border-right: 1px solid #eee; }
        td { padding: 12px 8px; text-align: center; border-bottom: 1px solid #f1f5f9; border-right: 1px solid #f1f5f9; font-size: 0.85rem; vertical-align: middle; }
        .st-name { font-weight: 900; color: white; background: var(--primary); width: 105px; border-right: none !important; }

        /* 공기청정기 카드 그리드 디자인 */
        .air-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 6px; padding: 5px; }
        .air-item { background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 6px; padding: 5px 2px; text-align: center; line-height: 1.2; }
        .air-item strong { display: block; font-size: 0.65rem; color: #64748b; margin-bottom: 2px; }
        .air-item span { font-weight: 800; font-size: 0.85rem; color: var(--dark); }
        .air-item.warning { background: #fff1f2; border-color: #fecaca; }
        .air-item.warning span { color: var(--danger); }
        
        .hvac-info { font-size: 0.8rem; line-height: 1.6; text-align: left; padding-left: 10px; }
        .hvac-info b { color: var(--primary); }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="container header-inner">
            <button onclick="location.reload()" style="padding:8px 16px; cursor:pointer; border-radius:6px; border:1px solid #cbd5e0; background:#fff; font-weight:700;">↺ 초기화</button>
            <div style="color: var(--primary); font-weight: 900; font-size: 1.5rem;">2호선 장비 가동일보 통합 분석</div>
            <div style="width:100px;"></div>
        </div>
    </header>

    <main class="container">
        <div id="upload-container" class="upload-box" onclick="document.getElementById('excelFile').click()">
            <input type="file" id="excelFile" hidden />
            <div style="font-size: 2.5rem; margin-bottom: 10px;">📊</div>
            <h3 style="margin:0; color: var(--primary);">2호선 가동일보 엑셀 업로드</h3>
            <p style="color:#64748b; font-weight: 600;">클릭하여 드림스 가동일보 파일을 선택하세요.</p>
        </div>
        <div id="result-area" class="branch-grid"></div>
    </main>

<script>
const CONFIG = {
    STATIONS: {
        left: { name: "문양기지기계분소", list: ["문양", "다사", "대실", "강창", "계명대", "성서산단", "이곡", "용산", "죽전", "감삼", "두류", "내당", "반고개", "청라언덕"] },
        right: { name: "사월기계분소", list: ["반월당", "경대병원", "대구은행", "범어", "수성구청", "만촌", "담티", "연호", "수성알파", "고산", "신매", "사월", "정평", "임당", "영남대"] }
    },
    NAME_MAP: { "성서산업단지": "성서산단", "수성알파시티": "수성알파", "영남대": "영대" }
};

document.getElementById('excelFile').addEventListener('change', function(e) {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
        const wb = XLSX.read(evt.target.result, { type: 'binary' });
        const sheet = wb.Sheets["장비"] || wb.Sheets[wb.SheetNames[0]];
        const results = process2LineSheet(sheet);
        renderResults(results);
        document.getElementById('upload-container').classList.add('minimized');
    };
    reader.readAsBinaryString(file);
});

function parseValue(v) {
    if(!v || v === "N/A" || v === "-" || v === "0") return 0;
    let s = String(v).trim();
    if(s.includes(':')) {
        const p = s.split(':');
        return (parseInt(p[0])||0) + (parseInt(p[1])||0)/60 + (parseInt(p[2])||0)/3600;
    }
    const n = parseFloat(s);
    return (n > 0 && n <= 1.0) ? n * 24 : n;
}

function process2LineSheet(s) {
    const rg = XLSX.utils.decode_range(s['!ref']);
    const finalData = [];
    const allStNames = [...CONFIG.STATIONS.left.list, ...CONFIG.STATIONS.right.list];

    allStNames.forEach(st => {
        const searchName = CONFIG.NAME_MAP[st] || st;
        let foundRow = -1;

        // 역사명 찾기 (A열 또는 B열에서 검색)
        for (let r=0; r<=rg.e.r; r++) {
            const aVal = String(s[XLSX.utils.encode_cell({r:r, c:0})]?.v || "");
            const bVal = String(s[XLSX.utils.encode_cell({r:r, c:1})]?.v || "");
            if (aVal.includes(searchName) || bVal.includes(searchName)) {
                foundRow = r;
                break;
            }
        }

        if (foundRow !== -1) {
            const stObj = { name: st, hvac: [], air: [] };
            
            // 역사명 발견 지점부터 아래로 60행까지 탐색
            for (let r = foundRow; r < foundRow + 60 && r <= rg.e.r; r++) {
                const colA = String(s[XLSX.utils.encode_cell({r:r, c:0})]?.v || "");
                const colB = String(s[XLSX.utils.encode_cell({r:r, c:1})]?.v || "");
                const combinedText = (colA + colB).replace(/\s/g, "");

                // 다른 역사의 이름이 나오면 해당 역사 데이터 수집 종료
                if (r > foundRow && allStNames.some(other => combinedText.includes(other) && other !== st)) break;

                const val = s[XLSX.utils.encode_cell({r:r, c:4})]?.v; // E열 가동시간
                const h = parseValue(val);

                if (combinedText.includes("승강장")) {
                    let label = combinedText.includes("시점") ? "시점" : "종점";
                    label += combinedText.includes("급기") ? "급" : "배";
                    stObj.hvac.push({ label, val: h });
                } else if (combinedText.includes("청정기")) {
                    const cleanName = colB.split(' ').pop().replace("청정기", "") || "청정";
                    stObj.air.push({ label: cleanName, val: h });
                }
            }
            finalData.push(stObj);
        }
    });
    return finalData;
}

function renderResults(data) {
    const resArea = document.getElementById('result-area');
    
    const buildColumn = (side) => {
        let html = `<div><div class="branch-title">📍 ${side.name}</div>`;
        html += `<div class="table-wrapper"><table><thead><tr><th style="width:105px;">역사</th><th style="width:130px;">승강장 공조</th><th>공기청정기 가동현황</th></tr></thead><tbody>`;
        
        data.filter(d => side.list.includes(d.name)).forEach(d => {
            html += `<tr><td class="st-name">${d.name}</td>`;
            
            // 공조기 영역
            html += `<td><div class="hvac-info">${d.hvac.map(hv => `${hv.label}: <b>${hv.val.toFixed(1)}h</b>`).join('<br>') || '-'}</div></td>`;

            // 공기청정기 영역 (카드 그리드)
            html += `<td><div class="air-grid">`;
            if(d.air.length > 0) {
                d.air.forEach(a => {
                    const isLow = a.val < 0.1;
                    html += `<div class="air-item ${isLow ? 'warning' : ''}"><strong>${a.label}</strong><span>${a.val.toFixed(1)}h</span></div>`;
                });
            } else {
                html += `<span style="color:#94a3b8; font-style:italic;">데이터 없음</span>`;
            }
            html += `</div></td></tr>`;
        });
        html += `</tbody></table></div></div>`;
        return html;
    };

    resArea.innerHTML = buildColumn(CONFIG.STATIONS.left) + buildColumn(CONFIG.STATIONS.right);
}
</script>
</body>
</html>
