<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2호선 가동일보 통합 분석</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        :root { --primary: #009223; --dark: #1e293b; --bg-light: #f8fafc; --danger: #e11d48; --border: #cbd5e0; }
        body { margin: 0; font-family: 'Pretendard', sans-serif; background: var(--bg-light); color: var(--dark); }
        .container { max-width: 1600px; margin: 0 auto; padding: 0 20px; }
        .app-header { background: white; border-bottom: 4px solid var(--primary); padding: 15px 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        .upload-box { background: white; padding: 30px; border: 3px dashed var(--primary); border-radius: 16px; text-align: center; cursor: pointer; margin-top: 20px; }
        .upload-box.minimized { padding: 10px; border-style: solid; border-width: 1px; display: flex; align-items: center; justify-content: center; gap: 20px; }

        .branch-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; margin-top: 25px; }
        .branch-title { background: var(--dark); color: white; padding: 10px 15px; border-radius: 8px; font-weight: 800; margin-bottom: 15px; }

        .table-wrapper { background: white; border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 25px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #f8fafc; padding: 10px; font-size: 0.8rem; border-bottom: 2px solid var(--border); }
        td { padding: 10px; text-align: center; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; vertical-align: top; }
        .st-name { font-weight: 900; color: white; background: var(--primary); width: 100px; }

        /* 공기청정기 카드 그리드 */
        .air-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(75px, 1fr)); gap: 6px; padding: 5px; }
        .air-item { background: #f1f5f9; border: 1px solid #e2e8f0; border-radius: 6px; padding: 5px 2px; text-align: center; }
        .air-item strong { display: block; font-size: 0.65rem; color: #64748b; margin-bottom: 2px; }
        .air-item span { font-weight: 800; font-size: 0.8rem; color: var(--dark); }
        .air-item.no-run { background: #fff1f2; border-color: #fecaca; }
        .air-item.no-run span { color: var(--danger); }
    </style>
</head>
<body>
    <header class="app-header">
        <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
            <div style="color: var(--primary); font-weight: 900; font-size: 1.4rem;">2호선 장비 가동일보 분석</div>
            <button onclick="location.reload()" style="padding:5px 15px; cursor:pointer; border-radius:5px; border:1px solid #ccc;">새로고침</button>
        </div>
    </header>

    <main class="container">
        <div id="upload-container" class="upload-box" onclick="document.getElementById('excelFile').click()">
            <input type="file" id="excelFile" hidden />
            <div style="font-size: 2rem;">📂</div>
            <h3 style="margin:5px 0; color: var(--primary);">2호선 엑셀 파일 업로드</h3>
            <p style="color:#64748b; font-size: 0.9rem;">파일을 선택하면 분석이 시작됩니다.</p>
        </div>
        <div id="result-area" class="branch-grid"></div>
    </main>

<script>
const CONFIG = {
    STATIONS: {
        left: { name: "문양기지기계분소", list: ["문양", "다사", "대실", "강창", "계명대", "성서산단", "이곡", "용산", "죽전", "감삼", "두류", "내당", "반고개", "청라언덕"] },
        right: { name: "사월기계분소", list: ["반월당", "경대병원", "대구은행", "범어", "수성구청", "만촌", "담티", "연호", "수성알파", "고산", "신매", "사월", "정평", "임당", "영남대"] }
    },
    NAME_MAP: { "성서산업단지": "성서산단", "수성알파시티": "수성알파", "영남대": "영대" }
};

document.getElementById('excelFile').addEventListener('change', function(e) {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
        const wb = XLSX.read(evt.target.result, { type: 'binary' });
        const sheet = wb.Sheets["장비"] || wb.Sheets[wb.SheetNames[0]];
        const results = processSheet(sheet);
        renderResults(results);
        document.getElementById('upload-container').classList.add('minimized');
    };
    reader.readAsBinaryString(file);
});

function parseValue(v) {
    if(!v || v === "N/A" || v === "-" || v === "0") return 0;
    let s = String(v).trim();
    if(s.includes(':')) {
        const p = s.split(':');
        return (parseInt(p[0])||0) + (parseInt(p[1])||0)/60;
    }
    const n = parseFloat(s);
    return (n > 0 && n <= 1.0) ? n * 24 : n;
}

function processSheet(s) {
    const rg = XLSX.utils.decode_range(s['!ref']);
    const finalData = [];
    const allSt = [...CONFIG.STATIONS.left.list, ...CONFIG.STATIONS.right.list];

    allSt.forEach(st => {
        const searchName = CONFIG.NAME_MAP[st] || st;
        let foundRow = -1;

        // 1. 역사 이름이 있는 행 찾기
        for (let r=0; r<=rg.e.r; r++) {
            const val = String(s[XLSX.utils.encode_cell({r:r, c:0})]?.v || s[XLSX.utils.encode_cell({r:r, c:1})]?.v || "");
            if (val.replace(/\s/g,"").includes(searchName)) {
                foundRow = r;
                break;
            }
        }

        if (foundRow !== -1) {
            const stObj = { name: st, hvac: [], air: [] };
            
            // 2. 역사 이름 행 바로 밑에서부터 최대 40행 탐색
            for (let r = foundRow; r < foundRow + 40 && r <= rg.e.r; r++) {
                const nameCell = String(s[XLSX.utils.encode_cell({r:r, c:0})]?.v || "");
                const typeCell = String(s[XLSX.utils.encode_cell({r:r, c:1})]?.v || "");
                const fullText = nameCell + typeCell;
                
                // 만약 다음 역사의 이름이 보이면 중단
                if (r > foundRow && allSt.some(nextSt => fullText.includes(nextSt) && nextSt !== st)) break;

                const val = s[XLSX.utils.encode_cell({r:r, c:4})]?.v;
                const h = parseValue(val);

                if (fullText.includes("승강장")) {
                    let label = fullText.includes("시점") ? "시점" : "종점";
                    label += fullText.includes("급기") ? "급" : "배";
                    stObj.hvac.push({ label, val: h });
                } else if (fullText.includes("청정기")) {
                    const uName = typeCell.split(' ').pop().replace("청정기","") || "청정";
                    stObj.air.push({ label: uName, val: h });
                }
            }
            finalData.push(stObj);
        }
    });
    return finalData;
}

function renderResults(data) {
    const resArea = document.getElementById('result-area');
    
    const buildTable = (side) => {
        let html = `<div><div class="branch-title">📍 ${side.name}</div>`;
        html += `<div class="table-wrapper"><table><thead><tr><th style="width:100px;">역사</th><th style="width:120px;">공조기 가동</th><th>공기청정기</th></tr></thead><tbody>`;
        
        data.filter(d => side.list.includes(d.name)).forEach(d => {
            html += `<tr><td class="st-name">${d.name}</td>`;
            
            // 공조기
            html += `<td>${d.hvac.map(hv => `<div style="margin-bottom:2px;">${hv.label}: <b>${hv.val.toFixed(1)}h</b></div>`).join('') || '-'}</td>`;

            // 공기청정기 (그리드 카드 디자인)
            html += `<td><div class="air-grid">`;
            d.air.forEach(a => {
                const isNoRun = a.val < 0.1;
                html += `<div class="air-item ${isNoRun?'no-run':''}"><strong>${a.label}</strong><span>${a.val.toFixed(1)}h</span></div>`;
            });
            html += `</div></td></tr>`;
        });
        html += `</tbody></table></div></div>`;
        return html;
    };

    resArea.innerHTML = buildTable(CONFIG.STATIONS.left) + buildTable(CONFIG.STATIONS.right);
}
</script>
</body>
</html>
