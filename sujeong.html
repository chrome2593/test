<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>대구교통공사 장비 가동 일보 분석 시스템</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        :root {
            --primary: #3b6fd4; --primary-dark: #3460b8; --primary-light: #eef3fc;
            --dark: #1e293b; --mid: #475569; --bg: #f5f7fb;
            --danger: #c0364f; --danger-light: #fdf2f4;
            --warning: #c0364f; --warning-light: #fdf2f4;
            --success: #1a7a5e; --success-light: #f0faf6;
            --border: #e2e8f0; --na: #94a3b8;
            --sidebar-w: 320px; --header-h: 58px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 16px rgba(52,96,184,0.07);
            --shadow-lg: 0 20px 40px rgba(0,0,0,0.10);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); color: var(--dark); line-height: 1.6; overflow: hidden; height: 100vh; }

        /* HEADER */
        .app-header { position: fixed; top: 0; left: 0; right: 0; z-index: 200; height: var(--header-h); background: #2d5299; display: flex; align-items: center; padding: 0 24px; gap: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.18); }
        .header-logo { display: flex; align-items: center; gap: 10px; color: white; font-size: 1rem; font-weight: 900; white-space: nowrap; }
        .header-logo .logo-icon { width: 32px; height: 32px; background: rgba(255,255,255,0.15); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .header-pills { flex: 1; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .header-pill { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 4px 14px; border-radius: 20px; font-size: 0.82rem; font-weight: 700; white-space: nowrap; }
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .header-btn { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25); color: white; padding: 6px 14px; border-radius: 20px; font-size: 0.82rem; font-weight: 700; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .header-btn.upload-btn { background: white; color: #2d5299; border-color: white; }

        .app-shell { display: flex; margin-top: var(--header-h); height: calc(100vh - var(--header-h)); }

        /* SIDEBAR */
        .sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: white; border-right: 1px solid var(--border); overflow-y: auto; overflow-x: hidden; display: flex; flex-direction: column; box-shadow: 2px 0 12px rgba(0,0,0,0.04); }
        .sidebar-header { padding: 16px 18px 12px; border-bottom: 1px solid var(--border); background: white; position: sticky; top: 0; z-index: 10; }
        .sidebar-title { font-size: 0.78rem; font-weight: 800; color: var(--na); text-transform: uppercase; }
        .sidebar-branch-name { font-size: 1rem; font-weight: 900; color: var(--dark); margin-top: 2px; }
        .progress-bar-wrap { margin-top: 10px; background: #f1f5f9; border-radius: 99px; height: 6px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--primary); transition: width 0.4s ease; }
        .progress-label { font-size: 0.73rem; color: var(--na); font-weight: 700; margin-top: 5px; display: flex; justify-content: space-between; }

        .sidebar-group { padding: 12px 14px 4px; }
        .sidebar-group-title { font-size: 0.72rem; font-weight: 800; color: var(--na); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
        .sidebar-group-title::before { content: ''; width: 3px; height: 11px; background: var(--primary); border-radius: 2px; }
        .checklist-item { display: flex; align-items: center; gap: 10px; padding: 8px 10px; border-radius: 10px; background: #fdf4f6; margin-bottom: 5px; cursor: pointer; transition: 0.2s; }
        .checklist-item.done { border-color: #d1fae5; background: #f0fdf4; opacity: 0.6; }
        .checklist-check { width: 18px; height: 18px; border-radius: 5px; border: 2px solid #dba0ae; background: white; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; }
        .checklist-item.done .checklist-check { background: var(--success); border-color: var(--success); color: white; }
        .checklist-label { font-size: 0.8rem; font-weight: 800; color: var(--danger); flex: 1; }
        .checklist-val { font-size: 0.72rem; font-weight: 700; color: var(--danger); background: #f5dde2; padding: 2px 7px; border-radius: 6px; }

        /* MAIN CONTENT */
        .main-content { flex: 1; overflow-y: auto; padding: 24px 28px 48px; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; align-items: start; }
        .upload-screen { display: flex; align-items: center; justify-content: center; height: 100%; }
        .upload-card { background: white; border-radius: 24px; padding: 60px; box-shadow: var(--shadow-md); border: 2px dashed #c5d3e8; text-align: center; cursor: pointer; max-width: 500px; width: 100%; }
        
        .modal-overlay { position: fixed; inset: 0; z-index: 500; background: rgba(10, 20, 50, 0.55); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.25s; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-box { background: white; border-radius: 24px; padding: 36px 32px; box-shadow: var(--shadow-lg); width: 460px; }
        .modal-choices { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 25px; }
        .modal-choice { border: 2px solid var(--border); border-radius: 16px; padding: 22px 18px; cursor: pointer; text-align: center; transition: 0.2s; }
        .modal-choice:hover { border-color: var(--primary); background: var(--primary-light); transform: translateY(-2px); }

        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        .alert-card { background: white; border-radius: 20px; padding: 22px; border-left: 8px solid var(--danger); box-shadow: var(--shadow-sm); border-top: 1px solid var(--border); border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        .alert-card.ok { border-left-color: var(--success); }
        .alert-card.full-width { grid-column: 1 / -1; }
        .alert-title { font-weight: 900; font-size: 1rem; margin-bottom: 12px; color: var(--dark); display: flex; justify-content: space-between; align-items: center; }
        .badge-list { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .badge-item { background: #fff1f2; color: var(--danger); padding: 8px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 800; display: flex; justify-content: space-between; align-items: center; border: 1px solid #ffe4e6; cursor: pointer; }
        .badge-item.checked { opacity: 0.4; text-decoration: line-through; background: #f1f5f9; color: var(--na); border-color: var(--border); }
        .val-tag { background: white; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; font-family: monospace; }

        .branch-tabs { display: flex; gap: 6px; margin-bottom: 22px; background: white; border: 1px solid var(--border); padding: 4px; border-radius: 14px; width: fit-content; }
        .branch-tab { padding: 8px 22px; border-radius: 10px; border: none; font-size: 0.88rem; font-weight: 800; cursor: pointer; background: transparent; color: var(--na); transition: 0.2s; }
        .branch-tab.active { background: var(--primary); color: white; }

        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
        .stat-card { background: white; border-radius: 14px; padding: 16px 18px; border: 1px solid var(--border); box-shadow: var(--shadow-sm); }
        .stat-label { font-size: 0.72rem; font-weight: 800; color: var(--na); }
        .stat-val { font-size: 1.6rem; font-weight: 900; }

        .detail-section-title { font-size: 0.85rem; font-weight: 900; color: var(--mid); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .detail-section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

        .accordion-btn { width: 100%; padding: 12px 16px; margin-bottom: 6px; border-radius: 12px; border: 1px solid var(--border); background: white; font-weight: 800; font-size: 0.88rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .accordion-btn.active { background: #3460b8; color: white; border-color: #3460b8; }
        .acc-badge { background: rgba(225,29,72,0.12); color: var(--danger); font-size: 0.7rem; padding: 1px 7px; border-radius: 8px; font-weight: 800; margin-left: 8px; }
        .accordion-btn.active .acc-badge { background: rgba(255,255,255,0.25); color: white; }
        .accordion-content { display: none; margin-bottom: 10px; animation: fadeDown 0.2s ease; }
        .accordion-content.active { display: block; }

        table { width: 100%; border-collapse: collapse; }
        th { background: #3460b8; color: white; padding: 9px 6px; font-size: 0.72rem; font-weight: 800; border-bottom: 1px solid var(--border); }
        td { padding: 10px 6px; text-align: center; border-bottom: 1px solid #f1f5f9; font-size: 0.86rem; font-weight: 600; }
        .td-station { font-weight: 900; color: var(--primary); background: #f8faff !important; width: 100px; border-right: 1px solid #f1f5f9; text-align: left; padding-left: 12px; }
        .critical-val { background: #c0364f !important; color: white !important; }
        .bad-val { background: #f5dde2 !important; color: var(--danger) !important; }
        .na-cell { background: #f8fafc !important; color: var(--na) !important; }

        @keyframes fadeDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header class="app-header">
    <div class="header-logo"><div class="logo-icon">🚇</div><span>대구교통공사 장비 가동 일보 분석 시스템</span></div>
    <div class="header-pills" id="header-pills"></div>
    <div class="header-actions">
        <button class="header-btn upload-btn" onclick="document.getElementById('excelFile').click()">📂 파일 업로드</button>
        <input type="file" id="excelFile" hidden />
        <button class="header-btn" onclick="location.reload()">↺ 초기화</button>
    </div>
</header>

<div class="modal-overlay" id="branchModal">
    <div class="modal-box">
        <div class="modal-badge" id="modal-line-badge">🚇 분소 선택</div>
        <div class="modal-title">분소를 선택해 주세요</div>
        <div class="modal-sub">상세 분석을 진행할 분소를 선택해 주세요.</div>
        <div class="modal-choices" id="modal-choices-area"></div>
        <button style="width:100%; margin-top:15px; padding:12px; border-radius:12px; border:1.5px dashed var(--border); background:white; font-weight:800; cursor:pointer;" onclick="AppController.selectBranch('both')">⇄ 두 분소 모두 보기</button>
    </div>
</div>

<div class="app-shell">
    <aside class="sidebar" id="sidebar">
        <div style="padding:40px 20px; text-align:center; color:var(--na); font-weight:700;">파일을 업로드하면<br>확인 필요 장비 목록이<br>표시됩니다.</div>
    </aside>

    <main class="main-content" id="main-content">
        <div class="upload-screen">
            <div class="upload-card" onclick="document.getElementById('excelFile').click()">
                <div style="font-size:4rem; margin-bottom:20px;">📊</div>
                <h2 style="font-weight:900; color:var(--primary); margin-bottom:10px;">가동일보 데이터 분석</h2>
                <p style="color:var(--na); font-weight:600;">DRIMS 가동일보 파일을 업로드 하세요.</p>
            </div>
        </div>
    </main>
</div>

<script>
/**
 * [환경 설정]
 */
const CONFIG = {
    VENT_SEASON: { INTER: [3, 4, 5, 10], SUMMER: [6, 7, 8, 9], WINTER: [11, 12, 1, 2] },
    NO_EQUIP: { "문양": ["공조기", "송풍기", "냉동기", "공기청정기"], "다사": ["상부배기", "하부배기"], "대실": ["상부배기", "하부배기"] },
    ST_NOR_TYPE: { "명덕": 1, "청라언덕": 1, "반월당": 1, "현충로": 2, "중앙로": 2, "안심": 2, "다사": 2, "두류": 2, "담티": 2, "영남대": 2, "영대": 2, "반월당(1호선)": 3 },
    ST_COOL_TYPE: { "화원": 1, "반야월": 1, "각산": 1, "대곡": 2, "월촌": 2, "송현": 2, "교대": 2, "명덕": 2, "동구청": 2, "방촌": 2, "용계": 2, "율하": 2, "신기": 2 },
    CHILLER_VALS: {
        "설화명곡":6.0,"화원":6.0,"대곡":6.0,"진천":5.5,"월배":5.5,"상인":11.5,"월촌":5.5,"송현":5.5,"서부정류장":10.0,"대명":5.5,"안지랑":5.5,"현충로":5.5,"영대병원":6.0,"교대":7.0,"명덕":6.0,"반월당":11.5,"중앙로":14.5,"대구역":6.0,"칠성시장":5.5,"신천":5.5,"동대구":11.5,"동구청":5.5,"아양교":6.0,"동촌":5.5,"해안":5.5,"방촌":6.0,"용계":5.5,"율하":6.0,"신기":5.5,"반야월":5.5,"각산":6.0,"안심":11.5,
        "문양":7.0,"다사":4.0,"대실":4.5,"강창":4.5,"계명대":4.5,"성서산단":4.5,"성서산업단지":4.5,"이곡":4.5,"용산":6.0,"죽전":6.0,"감삼":6.0,"두류":6.0,"내당":6.5,"반고개":6.0,"청라언덕":6.5,"반월당(2호선)":12.0,"경대병원":6.0,"대구은행":6.0,"범어":5.5,"수성구청":5.0,"만촌":4.5,"담티":5.0,"연호":5.0,"수성알파":5.0,"수성알파시티":5.0,"고산":6.5,"신매":5.5,"사월":6.0,"정평":5.5,"임당":4.5,"영남대":4.5,"영대":4.5
    },
    BRANCHES: {
        line1: {
            left: { name: "송현기계분소", stations: ["설화명곡","화원","대곡","진천","월배","상인","월촌","송현","서부정류장","대명","안지랑","현충로","영대병원","교대","명덕","반월당","중앙로"], icon: "🔴" },
            right: { name: "동대구기계분소", stations: ["대구역","칠성시장","신천","동대구","동구청","아양교","동촌","해안","방촌","용계","율하","신기","반야월","각산","안심"], icon: "🔴" }
        },
        line2: {
            left: { name: "문양기지기계분소", stations: ["문양","다사","대실","강창","계명대","성서산단","성서산업단지","이곡","용산","죽전","감삼","두류","내당","반고개","청라언덕"], icon: "🟢" },
            right: { name: "사월기계분소", stations: ["반월당","경대병원","대구은행","범어","수성구청","만촌","담티","연호","수성알파","수성알파시티","대공원","고산","신매","사월","정평","임당","영남대","영대"], icon: "🟢" }
        }
    },
    L1_ST_LIST: ["대곡","진천","월배","상인","월촌","송현","서부정류장","대명","안지랑","현충로","영대병원","교대","명덕","반월당","중앙로","대구역","칠성시장","신천","동대구","동구청","아양교","동촌","해안","방촌","용계","율하","신기","반야월","각산","안심"],
    // 대합실 공조기 부재 역사 데이터
    CONC_ABSENT: {
        line1: {
            start: ["안지랑", "영대병원", "동구청", "각산", "안심"],
            end: ["진천", "월배", "상인", "대명", "현충로", "명덕", "신천", "방촌", "용계"]
        },
        line2: {
            end: ["다사", "내당", "반고개", "고산"]
        }
    }
};

let isCooling = false, currentLine = '', ventSeason = '', globalData = null, selectedBranch = 'both';
let doneCount = 0, totalItems = 0;

/**
 * [모듈 1] 데이터 유틸리티
 */
const DataUtils = {
    parseH: (v) => {
        if(!v || v==="" || v==="-" || v==="N/A") return 0;
        if(typeof v === 'number') return v * 24;
        let s = String(v).trim();
        if(s.includes(':')) { let p = s.split(':'); return (parseInt(p[0])||0) + (parseInt(p[1])||0)/60 + (parseInt(p[2])||0)/3600; }
        return parseFloat(s) || 0;
    },
    formatToHMS: (v) => {
        if(!v || v==="-" || v==="N/A") return "-";
        let h = (typeof v === 'number') ? v : DataUtils.parseH(v);
        let ts = Math.round(h * 3600);
        return `${Math.floor(ts/3600)}:${String(Math.floor((ts%3600)/60)).padStart(2,'0')}:${String(ts%60).padStart(2,'0')}`;
    },
    getCV: (s, r, c) => { let cell = s[XLSX.utils.encode_cell({r,c})]; return cell ? (cell.w || String(cell.v || "")) : ""; }
};

/**
 * [모듈 2] 분석 엔진
 */
const AnalysisEngine = {
    analyzeHVAC: (val, st, type) => {
        if (CONFIG.NO_EQUIP[st] && (CONFIG.NO_EQUIP[st].includes("공조기") || CONFIG.NO_EQUIP[st].includes(type))) return { s: 'none', c: 'na-cell' };
        const h = DataUtils.parseH(val);
        if (!isCooling) {
            const cleanSt = st.replace(/\s+/g,"");
            const sk = (cleanSt === "반월당" && currentLine === 'line1') ? "반월당(1호선)" : cleanSt;
            const tNum = CONFIG.ST_NOR_TYPE[sk] || 4;
            const target = (tNum === 1) ? 17 : (tNum === 2 ? 15 : (tNum === 3 ? 15.5 : 16.5));
            if (type === 'supply') { if (Math.abs(h - target) >= 5) return { s: 'critical', c: 'critical-val' }; return (h >= 15 && h <= 18) ? { s: 'ok', c: '' } : { s: 'warning', c: 'bad-val' }; }
            else { return h <= (10/60) ? { s: 'critical', c: 'critical-val' } : (h <= 0.5 ? { s: 'warning', c: 'bad-val' } : { s: 'ok', c: '' }); }
        } else {
            const cleanSt = st.replace(/\s+/g,"");
            const tNum = CONFIG.ST_COOL_TYPE[cleanSt] || 3;
            const chKey = (cleanSt === "반월당" && currentLine === 'line2') ? "반월당(2호선)" : cleanSt;
            const chTg = CONFIG.CHILLER_VALS[chKey] || 9.0;
            if (type === 'supply') { if (tNum === 1) { if (Math.abs(h - 12) >= 4) return { s: 'critical', c: 'critical-val' }; return (h >= 10 && h <= 13) ? { s: 'ok', c: '' } : { s: 'warning', c: 'bad-val' }; } else if (tNum === 2) { return (h >= 7.5 && h <= 10.5) ? { s: 'ok', c: '' } : { s: 'warning', c: 'bad-val' }; } else { return (Math.abs(h - chTg) > 2) ? { s: 'critical', c: 'critical-val' } : { s: 'ok', c: '' }; } }
            else { if (h < 0.5 || h >= 4) return { s: 'critical', c: 'critical-val' }; return (h >= 0.5 && h <= 3.5) ? { s: 'ok', c: '' } : { s: 'warning', c: 'bad-val' }; }
        }
    },
    analyzeVent: (val, isR, st) => {
        if (CONFIG.NO_EQUIP[st] && CONFIG.NO_EQUIP[st].includes("송풍기")) return { s: 'none', c: 'na-cell' };
        const h = DataUtils.parseH(val);
        const cSt = st.replace(/\s+/g,"").replace("(2)","");
        if (cSt === "대실" || cSt === "범어") { const limit = (ventSeason === '하절기') ? 20 : 5; return (h >= limit) ? { s: 'critical', c: 'critical-val' } : { s: 'ok', c: '' }; }
        let target = (ventSeason === '간절기') ? 3 : (ventSeason === '하절기' ? (isR ? 10.8 : 9.8) : 2);
        if (currentLine === 'line1') { if (cSt === "중앙로" && isR) target = 19; if (cSt === "칠성시장" && !isR) target = 19; if (cSt === "방촌" && !isR) target = 19; if (cSt === "송현" && isR) target = 19; }
        else if (currentLine === 'line2') { if (cSt === "반월당") target = 19; if (cSt === "수성알파" && isR) target = 19; if (cSt === "수성구청" && isR) target = 19; if (cSt === "연호" && isR) target = 19; }
        if (ventSeason === '하절기') { if (["명덕","연호","임당","영남대"].some(s => cSt.includes(s)) && isR) target = 17.8; if (cSt === "고산" && isR) target = 6.5; if (cSt === "신매" && !isR) target = 5.5; if (cSt === "정평" && isR) target = 5.5; if (cSt === "이곡") target = 4.5; }
        if (h === 0 || Math.abs(h - target) >= 2) return { s: 'critical', c: 'critical-val' };
        if (Math.abs(h - target) <= 1.5) return { s: 'ok', c: '' }; return { s: 'warning', c: 'bad-val' };
    },
    analyzeAir: (val) => {
        const h = DataUtils.parseH(val); if (h === 0) return { s: 'none', c: '' };
        if (Math.abs(h - 17) >= 5) return { s: 'critical', c: 'critical-val' };
        return (h >= 15 && h <= 18) ? { s: 'ok', c: '' } : { s: 'warning', c: 'bad-val' };
    },
    analyzeConc: (val, stName, side) => {
        const h = DataUtils.parseH(val);
        const cleanSt = stName.replace(/\s+/g,"");
        // 부재 역사 판정
        if (CONFIG.CONC_ABSENT[currentLine] && CONFIG.CONC_ABSENT[currentLine][side] && CONFIG.CONC_ABSENT[currentLine][side].includes(cleanSt)) {
            return { s: 'none', c: 'na-cell' };
        }
        if (isCooling) {
            const chKey = (cleanSt === "반월당" && currentLine === 'line2') ? "반월당(2호선)" : cleanSt;
            const target = CONFIG.CHILLER_VALS[chKey] || 9.0;
            return (Math.abs(h - target) >= 4) ? { s: 'critical', c: 'critical-val' } : { s: 'ok', c: '' };
        } else {
            if (side === 'start') return (h <= 5 || h >= 11) ? { s: 'critical', c: 'critical-val' } : { s: 'ok', c: '' };
            else return (h <= 6 || h >= 12) ? { s: 'critical', c: 'critical-val' } : { s: 'ok', c: '' };
        }
    }
};

/**
 * [모듈 3] 데이터 추출기

const Extractor = {
    getLine1(s) {
        const res = { hvac: [], vent: [], chiller: [], air: [], conc: [] };
        const allSt = CONFIG.BRANCHES.line1.left.stations.concat(CONFIG.BRANCHES.line1.right.stations);
        allSt.forEach((st) => {
            let c, hR, vR, cV, aV, concR;

                c = 5; hR = [DataUtils.getCV(s,81,c),DataUtils.getCV(s,82,c),DataUtils.getCV(s,89,c),DataUtils.getCV(s,90,c)];
                vR = [DataUtils.getCV(s,97,c),DataUtils.getCV(s,98,c),DataUtils.getCV(s,99,c),DataUtils.getCV(s,100,c)];
                cV = DataUtils.parseH(DataUtils.getCV(s,155,c)) + DataUtils.parseH(DataUtils.getCV(s,156,c)); aV = DataUtils.getCV(s,179,c);
                concR = [DataUtils.getCV(s,79,c), DataUtils.getCV(s,80,c), DataUtils.getCV(s,87,c), DataUtils.getCV(s,88,c)];
            } else if (st === "화원") {
                c = 4; hR = [DataUtils.getCV(s,81,c),DataUtils.getCV(s,82,c),DataUtils.getCV(s,89,c),DataUtils.getCV(s,90,c)];
                vR = [DataUtils.getCV(s,97,c),DataUtils.getCV(s,98,c),DataUtils.getCV(s,99,c),DataUtils.getCV(s,100,c)];
                cV = DataUtils.parseH(DataUtils.getCV(s,155,c)) + DataUtils.parseH(DataUtils.getCV(s,156,c)); aV = DataUtils.getCV(s,179,c);
                concR = [DataUtils.getCV(s,79,c), DataUtils.getCV(s,80,c), DataUtils.getCV(s,87,c), DataUtils.getCV(s,88,c)];
            } else {
                c = CONFIG.L1_ST_LIST.indexOf(st) + 4;
                hR = [DataUtils.getCV(s,5,c),DataUtils.getCV(s,6,c),DataUtils.getCV(s,13,c),DataUtils.getCV(s,14,c)];
                vR = [DataUtils.getCV(s,19,c),DataUtils.getCV(s,20,c),DataUtils.getCV(s,21,c),DataUtils.getCV(s,22,c)];
                cV = DataUtils.parseH(DataUtils.getCV(s,56,c)); aV = DataUtils.getCV(s,75,c);
                concR = [DataUtils.getCV(s,1,c), DataUtils.getCV(s,2,c), DataUtils.getCV(s,9,c), DataUtils.getCV(s,10,c)];
            }
            res.hvac.push({ name: st, raw: hR, res: hR.map((v,i) => AnalysisEngine.analyzeHVAC(v,st,i%2===0?'supply':'exhaust')), isCri: false });
            res.hvac[res.hvac.length-1].isCri = res.hvac[res.hvac.length-1].res.some(r => r.s==='critical');
            res.vent.push({ name: st, raw: vR, res: vR.map((v,i) => AnalysisEngine.analyzeVent(v,i>=2,st)), isCri: false });
            res.vent[res.vent.length-1].isCri = res.vent[res.vent.length-1].res.some(r => r.s==='critical');
            if (isCooling) res.chiller.push({ name: st, raw: [cV], res: [{s:(cV===0||Math.abs(cV-(CONFIG.CHILLER_VALS[st]||6.0))>=3?'critical':'ok'),c:(cV===0||Math.abs(cV-(CONFIG.CHILLER_VALS[st]||6.0))>=3?'critical-val':'')}], isCri: (cV===0||Math.abs(cV-(CONFIG.CHILLER_VALS[st]||6.0))>=3) });
            if (DataUtils.parseH(aV) > 0) res.air.push({ name: st, units: [{label:"01호기",val:aV,res:AnalysisEngine.analyzeAir(aV)}], isCri: AnalysisEngine.analyzeAir(aV).s==='critical' });
            
            let cRes = [AnalysisEngine.analyzeConc(concR[0],st,'start'), AnalysisEngine.analyzeConc(concR[1],st,'start'), AnalysisEngine.analyzeConc(concR[2],st,'end'), AnalysisEngine.analyzeConc(concR[3],st,'end')];
            res.conc.push({ name: st, raw: concR, res: cRes, isCri: cRes.some(r=>r.s==='critical') });
        }); return res;
    },
    getLine2(s, apSheet) {
        const res = { hvac: [], vent: [], chiller: [], air: [], conc: [] };
        const allSt = CONFIG.BRANCHES.line2.left.stations.concat(CONFIG.BRANCHES.line2.right.stations);
        const rg = XLSX.utils.decode_range(s['!ref']);
        allSt.forEach(stName => {
            if (stName === "문양") { res.hvac.push({ name:"문양", raw:["-","-","-","-"], res:Array(4).fill({s:'none',c:'na-cell'}), isCri:false }); res.vent.push({ name:"문양", raw:["-","-","-","-"], res:Array(4).fill({s:'none',c:'na-cell'}), unitNames:["-","-","-","-"], isCri:false }); }
            const mn = stName.replace(/\s+/g,""); let fR = -1;
            for (let r = 0; r <= rg.e.r; r++) { if ((DataUtils.getCV(s,r,0)+DataUtils.getCV(s,r,1)).replace(/\s+/g,"").includes(mn)) { fR=r; break; } }
            if (fR !== -1) {
                if (stName !== "문양") { const isSp = ["정평","임당","영대","영남대"].some(sp => stName.includes(sp)); let hL=DataUtils.getCV(s,fR+5,4), hLe=DataUtils.getCV(s,fR+6,4), hR=DataUtils.getCV(s,fR+(isSp?9:8),4), hRe=DataUtils.getCV(s,fR+(isSp?10:9),4); res.hvac.push({ name:stName, raw:[hL,hLe,hR,hRe], res:[AnalysisEngine.analyzeHVAC(hL,stName,'supply'),AnalysisEngine.analyzeHVAC(hLe,stName,'exhaust'),AnalysisEngine.analyzeHVAC(hR,stName,'supply'),AnalysisEngine.analyzeHVAC(hRe,stName,'exhaust')], isCri:false }); res.hvac[res.hvac.length-1].isCri = res.hvac[res.hvac.length-1].res.some(r=>r.s==='critical'); }
                
                let unitsV=[], chSum=0, chFound=false, unitsConc=[];
                const isBWD = stName==="반월당"; const vNameCol=isBWD?16:11, vValCol=isBWD?19:14;
                for (let r=fR; r<fR+55&&r<=rg.e.r; r++) {
                    let lblB = DataUtils.getCV(s,r,1).replace(/\s+/g,""), valE = DataUtils.getCV(s,r,4);
                    if (stName!=="문양" && DataUtils.getCV(s,r,vNameCol).includes("환기실")) {
                        let vn = DataUtils.getCV(s,r,vNameCol).replace("환기실","").trim();
                        let vv = DataUtils.getCV(s,r,vValCol);
                        unitsV.push({l:vn,v:vv,r:AnalysisEngine.analyzeVent(vv,(vn.includes("우")||vn.includes("종점")),stName)});
                    }
                    if (lblB.includes("대합실") || lblB.includes("대합")) {
                        let side = (lblB.includes("좌") || lblB.includes("시점")) ? 'start' : 'end';
                        unitsConc.push({ label: lblB, val: valE, res: AnalysisEngine.analyzeConc(valE, stName, side) });
                    }
                    if (getCV(s,r,0).includes("냉동기")&&stName!=="문양") { chSum+=DataUtils.parseH(DataUtils.getCV(s,r,4)); chFound=true; }
                }
                if (stName!=="문양"&&unitsV.length>0) res.vent.push({name:stName,raw:unitsV.slice(0,4).map(u=>u.v),res:unitsV.slice(0,4).map(u=>u.r),unitNames:unitsV.slice(0,4).map(u=>u.l),isCri:unitsV.some(u=>u.r.s==='critical')});
                if (chFound&&isCooling) { const sk=(stName==="반월당")?"반월당(2호선)":stName; const isC=(chSum===0||Math.abs(chSum-(CONFIG.CHILLER_VALS[sk]||6.0))>=3); res.chiller.push({name:stName,raw:[chSum],res:[{s:isC?'critical':'ok',c:isC?'row-critical':''}],isCri:isC}); }
                if (unitsConc.length>0) res.conc.push({ name: stName, units: unitsConc, isCri: unitsConc.some(u=>u.res.s==='critical') });

                if (apSheet) {
                    let rawUnits=[]; let apR=-1; const apRg=XLSX.utils.decode_range(apSheet['!ref']);
                    for(let r=0;r<=apRg.e.r;r++){if(DataUtils.getCV(apSheet,r,0).replace(/\s+/g,"").includes(mn)){apR=r;break;}}
                    if (apR !== -1) { for(let r=apR;r<apR+50&&r<=apRg.e.r;r++){ const nL=DataUtils.getCV(apSheet,r,1),vL=DataUtils.getCV(apSheet,r,4),nR=DataUtils.getCV(apSheet,r,6),vR=DataUtils.getCV(apSheet,r,9); if(nL&&nL!=="장비명"&&!nL.includes("스마트")&&vL!==""){rawUnits.push({label:nL.trim().substring(0,2)+"호기",val:vL,res:AnalysisEngine.analyzeAir(vL)});} if(nR&&nR!=="장비명"&&!nR.includes("스마트")&&vR!==""){rawUnits.push({label:nR.trim().substring(0,2)+"호기",val:vR,res:AnalysisEngine.analyzeAir(vR)});} if(r>apR+5&&!nL&&!nR)break; } rawUnits.sort((a,b)=>a.label.localeCompare(b.label,undefined,{numeric:true})); }
                    if (rawUnits.length>0) res.air.push({name:stName,units:rawUnits,isCri:rawUnits.some(a=>a.res.s==='critical')});
                }
            }
        }); return res;
    }
};

const UI_Renderer = {
    buildTable: (items, labels) => {
        let h = `<table><thead><tr><th style="width:90px;text-align:left;padding-left:12px;">역사</th>${labels.map(l=>`<th>${l}</th>`).join('')}<th>판정</th></tr></thead><tbody>`;
        items.forEach(d => {
            const isEx = d.res.length > 0 && d.res[0].s === 'none';
            h += `<tr class="${d.isCri?'row-critical':''}">`;
            h += `<td class="td-station">${d.name}</td>`;
            for (let i = 0; i < labels.length; i++) h += `<td class="${(isEx || d.res[i]?.s==='none') ? 'na-cell' : (d.res[i] ? d.res[i].c : '')}">${(isEx || d.res[i]?.s==='none') ? '-' : DataUtils.formatToHMS(d.raw[i])}</td>`;
            h += `<td><b style="color:${isEx?'var(--na)':(d.isCri?'var(--danger)':'var(--success)')}">${isEx ? '장비없음' : (d.isCri ? '이상' : '정상')}</b></td></tr>`;
        }); return h + `</tbody></table>`;
    },
    buildTableAir: (items, lbl = "장비명") => {
        let h = `<table><thead><tr><th style="width:90px;text-align:left;padding-left:12px;">역사</th><th>${lbl}</th><th>가동시간</th><th>판정</th></tr></thead><tbody>`;
        items.forEach(d => { d.units.forEach((u, idx) => {
            const isEx = u.res.s === 'none';
            h += `<tr class="${u.res.s==='critical'?'row-critical':''}">`;
            if (idx === 0) h += `<td class="td-station" rowspan="${d.units.length}">${d.name}</td>`;
            h += `<td style="color:#64748b;font-size:0.82rem;">${u.label}</td><td class="${isEx?'na-cell':u.res.c}" style="font-weight:700;">${isEx?'-':DataUtils.formatToHMS(u.val)}</td><td><b style="color:${isEx?'var(--na)':(u.res.s==='critical'?'var(--danger)':'var(--success)')}">${isEx?'장비없음':(u.res.s==='critical'?'이상':'정상')}</b></td></tr>`;
        }); }); return h + `</tbody></table>`;
    },
    buildAccordion: (title, count, html, id) => {
        const badge = count > 0 ? `<span class="acc-badge">${count}건 이상</span>` : '';
        return `<button class="accordion-btn" onclick="toggleAcc(this,'${id}')"><span>전체 역사 현황 ${badge}</span><span class="acc-arrow">▾</span></button><div class="accordion-content" id="${id}">${html}</div>`;
    },
    buildAlertCard: (title, items, type, full = false) => {
        const cls = full ? 'full-width' : '';
        if (items.length === 0) return `<div class="alert-card ok ${cls}"><div class="alert-title">${title} ✅</div><p style="color:var(--success); font-size:0.85rem; font-weight:700;">이상 항목 없음</p></div>`;
        let h = `<div class="alert-card ${cls}"><div class="alert-title">${title} ⚠️</div><div class="badge-list">`;
        items.forEach(d => {
            if (type === 'air' || type === 'conc') {
                d.units.forEach(u => { if(u.res.s==='critical') h += `<div class="badge-item" onclick="this.classList.toggle('checked')"><span>${d.name} ${u.label}</span><span class="val-tag">${DataUtils.formatToHMS(u.val)}</span></div>`; });
            } else {
                d.res.forEach((r, i) => { if (r.s === 'critical') {
                    const lbl = (type==='vent'&&currentLine==='line2'?(d.unitNames?d.unitNames[i]:["시급","시배","종급","종배"][i]):(type==='chiller'?"냉동기":["시급","시배","종급","종배"][i]));

            }
        });
        return h + `</div></div>`;
    }
};

        sumGrid += '</div>';

        let detailHtml = `<div class="detail-grid"><div><div class="detail-section-title">⚙️ 공조기 상세내역</div>${UI_Renderer.buildAccordion('승강장공조기', cntH, UI_Renderer.buildTable(sH, ["시급","시배","종급","종배"]), 'h'+idx)}</div><div><div class="detail-section-title">🌪️ 송풍기 상세내역</div>${UI_Renderer.buildAccordion('환기실송풍기', cntV, UI_Renderer.buildTable(sV, ["시급","시배","종급","종배"]), 'v'+idx)}</div></div>`;
        detailHtml += `<div class="detail-grid"><div><div class="detail-section-title">🌬️ 공기청정기 상세내역</div>${UI_Renderer.buildAccordion('공기청정기', cntA, UI_Renderer.buildTableAir(sA), 'a'+idx)}</div><div><div class="detail-section-title">🏢 대합실공조기 상세내역</div>${UI_Renderer.buildAccordion('대합실공조기', cntConc, (currentLine === 'line1' ? UI_Renderer.buildTable(sConc, ["시급","시배","종급","종배"]) : UI_Renderer.buildTableAir(sConc, "구분")), 'conc'+idx)}</div></div>`;
        if (isCooling) detailHtml += `<div style="margin-top:16px;"><div class="detail-section-title">❄️ 냉동기 합산내역</div>${UI_Renderer.buildAccordion('냉동기', cntC, UI_Renderer.buildTable(sC, ["가동시간"]), 'c'+idx)}</div>`;

        return sumGrid + detailHtml;
    }
};

function renderSidebar(branches, data) {
    let html = ''; totalItems = 0; doneItems = 0;
    branches.forEach(br => {
        const cH = data.hvac.filter(d => br.stations.includes(d.name) && d.isCri), cV = data.vent.filter(d => br.stations.includes(d.name) && d.isCri), cC = data.chiller.filter(d => br.stations.includes(d.name) && d.isCri), cA = data.air.filter(d => br.stations.includes(d.name) && d.isCri), cConc = data.conc.filter(d => br.stations.includes(d.name) && d.isCri);
        if (branches.length > 1) html += `<div style="padding:12px 18px 5px; font-weight:900; color:var(--primary); font-size:0.8rem;">📍 ${br.name}</div>`;
        const makeG = (icon, title, items, type) => {
            if (items.length === 0) return ''; let h = `<div class="sidebar-group"><div class="sidebar-group-title">${icon} ${title}</div>`;
            items.forEach(d => { if (type === 'air' || type === 'conc') { d.units.forEach(u => { if(u.res.s==='critical') { totalItems++; h += `<div class="checklist-item" onclick="checkItem(this)"><div class="checklist-check"></div><div class="checklist-label">${d.name}<br><span style="font-size:0.72rem;">${u.label}</span></div><div class="checklist-val">${DataUtils.formatToHMS(u.val)}</div></div>`; }}); } else { d.res.forEach((r, i) => { if (r.s === 'critical') { totalItems++; const lbl = (type==='vent'&&currentLine==='line2'?(d.unitNames?d.unitNames[i]:["시급","시배","종급","종배"][i]):(type==='chiller'?"냉동기":["시급","시배","종급","종배"][i])); h += `<div class="checklist-item" onclick="checkItem(this)"><div class="checklist-check"></div><div class="checklist-label">${d.name}<br><span style="font-size:0.72rem;">${lbl}</span></div><div class="checklist-val">${DataUtils.formatToHMS(d.raw[i])}</div></div>`; }}); } });
            return h + `</div>`;
        };
        html += makeG('⚙️','공조기', cH, 'hvac') + makeG('🌪️','송풍기', cV, 'vent') + makeG('❄️','냉동기', cC, 'chiller') + makeG('🌬️','공기청정기', cA, 'air') + makeG('🏢','대합실공조', cConc, 'conc');
    });
    document.getElementById('sidebar').innerHTML = `<div class="sidebar-header"><div class="sidebar-title">확인 필요 장비</div><div class="sidebar-branch-name">${branches.map(b=>b.name).join(' / ')}</div><div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-fill" style="width:0%"></div></div><div class="progress-label"><span id="prog-done">0 / ${totalItems} 완료</span><span id="prog-pct">0%</span></div></div>${totalItems === 0 ? '<div class="sidebar-all-clear">✅ 모든 장비 정상</div>' : html}`;
    totalCount = totalItems; updateProgress();
}
function checkItem(el) { if (el.classList.contains('done')) { el.classList.remove('done'); el.querySelector('.checklist-check').innerHTML = ''; doneItems = Math.max(0, doneItems - 1); } else { el.classList.add('done'); el.querySelector('.checklist-check').innerHTML = '✓'; doneItems++; } updateProgress(); }
function updateProgress() { let pct = totalCount === 0 ? 100 : Math.round((doneItems / totalCount) * 100); if (document.getElementById('prog-fill')) document.getElementById('prog-fill').style.width = pct + '%'; if (document.getElementById('prog-done')) document.getElementById('prog-done').textContent = `${doneItems} / ${totalCount} 완료`; if (document.getElementById('prog-pct')) document.getElementById('prog-pct').textContent = pct + '%'; }
function toggleAcc(btn, id) { btn.classList.toggle('active'); document.getElementById(id).classList.toggle('active'); }
function switchTab(s) { const isL = s === 'l'; document.getElementById('tab-l').classList.toggle('active', isL); document.getElementById('tab-r').classList.toggle('active', !isL); document.getElementById('panel-l').style.display = isL ? '' : 'none'; document.getElementById('panel-r').style.display = isL ? 'none' : ''; }

AppController.init();
</script>
</body>
